# Kenning prototype — canonical configuration
#
# This file is the single source of truth for every tunable parameter in
# the system. Subsystems read it via:
#
#     from kenning.config import get_config
#     cfg = get_config()
#
# Path values are interpreted relative to the project root unless absolute.
# String values may use ${VAR_NAME} to substitute environment variables.
#
# Schema is enforced by pydantic in src/kenning/config.py — unknown keys
# fail validation at startup. Edit the schema there to add new fields.
#
# DECISIONS BAKED IN (deviate from the Foundation prompt's example):
# - addressing.warm_mode_duration_seconds: 30 (NOT 10, per user override)
# - llm.provider: "llama_cpp" (NOT ollama, per Ollama compat-test outcome)
# - qdrant.data_dir: "data/qdrant" (NOT ./qdrant_data/, matches existing layout)
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                        TUNING SUMMARY                                    ║
# ║      The knobs you'll touch most often live, with current values         ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║                                                                          ║
# ║   STT     stt.engine                    "moonshine"  (CPU, streams)     ║
# ║           stt.gaming_engine             "moonshine"                     ║
# ║           stt.moonshine_model           "medium-streaming-en"           ║
# ║           (Parakeet swap: stt.engine "parakeet"  -- CUDA, ~700 MB)      ║
# ║           (Whisper swap:  stt.engine "whisper" +                        ║
# ║            stt.model "Systran/faster-distil-whisper-small.en")          ║
# ║                                                                          ║
# ║   LLM     llm.preset                    "qwen3.5-4b"                     ║
# ║           llm.default_temperature       0.7                              ║
# ║           llm.default_top_p             0.9                              ║
# ║           llm.default_max_tokens        512                              ║
# ║                                                                          ║
# ║   TTS     tts.engine                    "kokoro"                         ║
# ║           tts.pause_ms                  50    (inter-sentence silence)   ║
# ║           tts.kokoro.voice              "kenning"                     ║
# ║           tts.kokoro.speed              1.3                              ║
# ║           tts.kokoro.device             "cuda"  (gaming mode -> cpu)     ║
# ║                                                                          ║
# ║   VAD     vad.smart_turn.fast_path_silence_duration_ms   300             ║
# ║           vad.smart_turn.early_completion_threshold      0.65            ║
# ║           vad.smart_turn.incomplete_extension_ms         700             ║
# ║                                                                          ║
# ║   MIC     audio.input_device            "Focusrite"                      ║
# ║           audio.input_gain_db           10.0                             ║
# ║                                                                          ║
# ║   MEM     memory.rag_min_relevance      0.6                              ║
# ║           memory.history_turns_for_llm  4                                ║
# ║                                                                          ║
# ║   How to swap LLM presets without editing this file:                     ║
# ║      python scripts/swap_llm_preset.py qwen3.5-4b                        ║
# ║      $env:KENNING_LLM_PRESET = "qwen3.5-9b"; python -m kenning             ║
# ║      voice: "switch to the 9B" / "switch to the gemma"                   ║
# ║                                                                          ║
# ║   How to swap TTS engines: edit tts.engine then restart                  ║
# ║      "kokoro"   = active default (CPU StyleTTS2; ~0 GB VRAM)             ║
# ║      "xtts_v3"  = swap-back (XTTS v2 + v3 filter; +60 ms TTFT, +2 GB)    ║
# ║      "piper_rvc"= legacy fallback (Piper + RVC; never deprecated)        ║
# ║                                                                          ║
# ║   How to swap STT engines: edit stt.engine then restart                  ║
# ║      "moonshine"= active default (moonshine-voice medium-streaming-en;   ║
# ║                  ~430 MB on disk, 0 VRAM, streaming partials)           ║
# ║      "whisper"  = swap-back (faster-distil-whisper-small.en;            ║
# ║                  ~200-250 MB VRAM, ~3.48% WER on LS-clean)              ║
# ║      "parakeet" = NVIDIA Parakeet TDT 0.6B v3 (subprocess; ~5.1 GB VRAM, ║
# ║                  best on jargon / accents; 2026-05-22 wired)            ║
# ║      "auto"     = try parakeet, fall back to whisper                     ║
# ║                                                                          ║
# ║   Restart Kenning after any value change in this file:                    ║
# ║      python -m kenning                                                    ║
# ║                                                                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

version: "1.0"

# ---------------------------------------------------------------------------
# Audio capture
# ---------------------------------------------------------------------------

audio:
  sample_rate: 16000          # Hz; required by Silero VAD, openWakeWord, Whisper
  channels: 1                 # mono
  # 2026-05-16 latency pass 2: 512 -> 256 (32 ms -> 16 ms). Smaller
  # blocks halve the mic-to-consumer queue latency. Silero VAD's
  # internal window is 512 samples regardless -- it buffers two
  # 256-sample blocks for one decision -- so VAD timing is unchanged,
  # but the orchestrator's silence-onset detection in Phase 3 / 4 has
  # finer granularity (16 ms steps vs 32 ms) for "first silence frame
  # after speech" callbacks. CPU cost on a Ryzen is trivial.
  blocksize: 256              # frames per callback (~16 ms at 16 kHz)
  dtype: "float32"
  # 2026-05-09 audio-quality pass: switched from Voicemeeter (virtual
  # cable + compressor + gain in software) to direct USB mic input.
  # Going direct gives us the raw signal so Kenning-side processing
  # (gain, VAD threshold, wake threshold, AGC) can be tuned to the
  # actual mic + room acoustics without a hidden processing layer.
  # Substring match against device name; "Focusrite" picks up the
  # USB interface (Analogue 1 + 2). Set KENNING_AUDIO_DEVICE env var
  # to override (e.g. "Voicemeeter Out B2" to revert).
  input_device: "Focusrite"
  output_device: null         # null = system default; or set KENNING_AUDIO_OUTPUT_DEVICE env
  # EVERYTHING output: mirrors EVERY line Kenning speaks -- normal chat AND
  # team relay -- to a separate, OBS-capturable device for stream viewers.
  # "" / null = off. Never replaces output_device (you still hear Kenning on
  # your speakers) and is routing-independent of the relay mic bus, so
  # teammates never hear normal conversation. Points at the FREE VoiceMeeter
  # "Voicemeeter AUX Input" virtual strip; route that strip to bus B3 in
  # VoiceMeeter and capture "Voicemeeter Out B3" in OBS. Hot-swappable from the
  # settings panel (Voice -> Everything output (OBS)).
  broadcast_device: "Voicemeeter AUX Input"
  # Prefer the Windows WASAPI endpoint (~2-25 ms) over MME (~90-180 ms) for all
  # OUTPUT devices + open every output stream at latency='low'. Fail-safe: a
  # device whose WASAPI endpoint won't open falls back to MME + latency='low'.
  prefer_wasapi_output: true
  # LIVE speaker mute (toggle in the settings panel: "Mute my speakers"). When
  # true, Ultron is silent on your default speakers while the relay still
  # reaches teammates (B1) + OBS (B3) -- lets you A/B the isolated loopback
  # tracks. Hot-applied on the next line; no restart.
  mute_speakers: false
  barge_in_enabled: true      # wake-word interrupts Kenning's own TTS
  barge_in_grace_seconds: 0.5
  # Always-on "Ultron, stop": run the interrupt watcher (all-channel stop)
  # whenever EITHER barge-in OR this is on, so "stop" works even with
  # barge_in_enabled held off for loopback hygiene. Env: KENNING_STOP_COMMAND_ENABLED.
  stop_command_enabled: true
  # 2026-05-09 audio-quality pass: pre-amp applied to the captured
  # chunk BEFORE VAD / wake-word / Whisper. 0 dB = no-op (legacy).
  # Tune up when the mic is hot enough close-up but too quiet at
  # range. Far-field mic improvement typically wants +6 to +18 dB
  # depending on the mic's native sensitivity. Schema range is
  # -20..+40 dB. Values are hard-clipped to [-1, 1] after gain to
  # prevent distortion from over-amplification.
  input_gain_db: 10.0
  # Total ring-buffer capacity. The orchestrator slices mode-specific
  # pre-roll out of this -- ``cold_pre_roll_seconds`` after a wake
  # word, ``warm_pre_roll_seconds`` after VAD speech-start in WARM
  # follow-up. Capacity must be >= max(cold, warm) so the larger
  # slice has the audio it needs.
  ring_buffer_seconds: 0.5
  # COLD pre-roll (post-wake): short by design so the wake-word
  # "Kenning" tail does not bleed into Whisper as a "Tron" prefix.
  # The 2026-05-09 pass tuned this to 0.15 for the custom wake-word
  # model's typical fire latency. If you switch wake-word models,
  # re-tune.
  cold_pre_roll_seconds: 0.15
  # WARM pre-roll (post-TTS follow-up): longer because there's no
  # wake-word firing event to align against -- the user just starts
  # speaking from silence and Silero VAD has ~100-200 ms detection
  # latency. Without enough pre-roll the leading word gets clipped
  # (e.g. "What's the weather like" comes through as "the weather
  # like"). 0.5 s reliably captures the leading consonant + vowel.
  warm_pre_roll_seconds: 0.5

# ---------------------------------------------------------------------------
# Auto push-to-talk (Valorant TEAM voice chat -- PTT only in game)
# ---------------------------------------------------------------------------
# Holds the in-game team-PTT key while a relay line plays so Ultron's callouts
# transmit. The key is pressed by an EXTERNAL USB-HID microcontroller over a
# serial port -- the host writes bytes ONLY, never synthetic input (the
# anticheat-clean design). DEFAULT OFF + fail-safe: with no device / disabled it
# is completely inert. To arm: flash the firmware, set enabled + serial_port.
push_to_talk:
  enabled: true              # master switch. Env: KENNING_PTT_ENABLED  [stream-build: ON]
  backend: "rawhid"          # "rawhid" (HID-only hardened device; NO serial fallback) | "auto" | "serial". 2026-06-17 audit: pinned to rawhid so PTT can ONLY use the masked HID keyboard (VID 0x1209, no COM port) and NEVER auto-falls-back to the legacy-CDC serial path that scans for the Arduino VID 0x2341. If the hardened device is absent, PTT is inert (NullPttBackend) rather than opening a COM port.
  hid_vid: 0x1209            # HID-only device USB VID (pid.codes open hardware)
  hid_usage_page: 0xFFC0     # vendor Raw-HID command collection (matches firmware/leonardo_ptt_hid)
  serial_port: "auto"        # legacy serial device: "auto" -> detect by USB id; or "COM5". Env: KENNING_PTT_SERIAL_PORT
  baud: 9600
  key: "6"                   # the in-game team-PTT key the device holds (match your bind + firmware)
  lead_ms: 200               # hold the key this long BEFORE audio (open the channel; never clip the first phoneme). Dead air = imperceptible.
  release_tail_ms: 300       # keep holding this long AFTER the clip drains (device buffer + game codec tail; never clip the last phoneme). Dead air = imperceptible.
  release_jitter_ms: 60      # 2026-06-17 audit: random 0..60ms EXTRA on the release tail so the HID key-hold duration is never machine-precise (behavioral-fingerprint reducer). Only extends the mic window (never clips); async (zero latency). 0 disables.
  heartbeat_ms: 50           # keep-alive cadence refreshing the firmware hardware deadman
  max_hold_seconds: 8.0      # host watchdog: force-release if a single hold runs longer than this

# ---------------------------------------------------------------------------
# Voice Activity Detection
# ---------------------------------------------------------------------------

vad:
  threshold: 0.5              # silero-vad confidence threshold for speech
  min_speech_duration_ms: 250 # ignore blips shorter than this
  # Silence required before VAD marks end-of-utterance. 2026-05-09:
  # raised 500 -> 1200 so natural mid-sentence pauses (thinking,
  # taking a breath, looking up a word) don't prematurely close the
  # capture. Trade-off: end-of-turn detection is ~0.7 s slower, but
  # users no longer get cut off mid-thought. Voice TTFT measurement
  # is post-end-of-speech so the 79 ms baseline is unaffected.
  min_silence_duration_ms: 1200
  window_samples: 512         # silero v5 expects 512-sample windows at 16 kHz
  # 2026-05-11 adaptive end-of-turn: once speech has been active for
  # ``long_utterance_threshold_seconds``, the orchestrator bumps VAD's
  # silence requirement to ``long_utterance_silence_duration_ms`` for
  # the rest of the capture. Short utterances stay snappy at the
  # 1200 ms baseline; long technical prompts get a 2400 ms grace
  # window for mid-sentence thinking pauses. Set threshold to 0 to
  # disable the adaptive bump entirely.
  long_utterance_threshold_seconds: 8.0
  long_utterance_silence_duration_ms: 2400
  # 2026-05-11 follow-up fix: hard ceiling on a single VAD-bounded
  # capture. Legacy value was 15 s (orchestrator class constant); a
  # real session captured a 15.16 s recording that was cut off
  # mid-sentence on a complex "write me a program that converts PDF
  # to Docx..." ask because the user was still talking at the cap.
  # Raising to 30 s comfortably covers detailed one-breath asks
  # while still bounding pathological cases (stuck mic, background
  # noise that never resolves to SPEECH_END, etc.). Schema range is
  # 5-120 s; values outside trip validate_config.py.
  max_utterance_seconds: 30.0

  # 2026-05-12 Smart Turn V3 -- semantic end-of-turn confirmation.
  # Runs AFTER Silero VAD declares end-of-speech. 8 MB int8 ONNX, CPU
  # inference ~12 ms, zero VRAM cost. When enabled, the orchestrator
  # uses fast_path_silence_duration_ms as the baseline silence
  # requirement (much shorter than the legacy 1200 ms / current 500 ms
  # vad.min_silence_duration_ms) and the model confirms or rejects
  # the early end-of-speech. Long utterances (>window_seconds of
  # speech) bypass the model -- the adaptive long-utterance backstop
  # already handles those at the VAD layer. Fail-open: missing model
  # file degrades silently to legacy VAD-only behaviour.
  smart_turn:
    enabled: true
    model_path: "models/smart_turn/smart-turn-v3.2-cpu.onnx"
    # Sigmoid threshold above which the model declares the turn
    # complete at the MEDIUM-confidence checkpoint (legacy 500 ms
    # baseline path). 0.5 is Pipecat's production-tested default.
    completion_threshold: 0.5
    # 2026-05-16 latency pass 2: gradient-fire early threshold. When
    # the model returns prob >= early_completion_threshold at the
    # fast_path_silence checkpoint (300 ms), submit immediately.
    # Saves the legacy 200 ms wait on confidently-complete turns.
    # Prob in [completion_threshold, early_completion_threshold)
    # waits medium_grace_ms then re-checks with completion_threshold
    # (legacy 500 ms behaviour). Prob < completion_threshold enters
    # the incomplete_extension_ms path (user trailed off).
    early_completion_threshold: 0.65
    # 2026-05-16 latency pass 2: dropped 500 -> 300 ms. Pipecat's
    # smart-turn-v3.2 blog confirms maintained accuracy at lower
    # silence baselines; combined with early_completion_threshold
    # gating we never auto-submit on weak verdicts at 300 ms.
    fast_path_silence_duration_ms: 300
    # 2026-05-16 latency pass 2: silence grace appended to fast_path
    # when the early verdict is "medium-confidence complete"
    # (prob between completion and early thresholds). After this
    # extra wait the orchestrator re-checks against completion_threshold.
    # 200 ms takes us from 300 ms fast-path to 500 ms total,
    # matching the prior legacy baseline for medium-confidence turns.
    medium_grace_ms: 200
    # When smart-turn says "incomplete", wait this much additional
    # silence before submitting anyway. Prevents the orchestrator
    # from hanging if the user actually was done speaking despite the
    # incomplete verdict. 300 (fast) + 700 (incomplete extension) =
    # ~1000 ms total, comfortably below the legacy 1200 ms backstop.
    incomplete_extension_ms: 700
    # Audio window cap fed to the model. Matches training; longer
    # utterances are truncated to the last 8 s by the wrapper.
    window_seconds: 8.0
    # ONNX intra-op thread count. 1 is recommended.
    num_threads: 1

# ---------------------------------------------------------------------------
# Wake word
# ---------------------------------------------------------------------------

wake_word:
  # "kenning" and "ultron" are side-by-side custom models in
  # models/openwakeword/. The active word is `name`; hot-swap between them
  # from the settings panel's "Wake word" dropdown (no restart). When the
  # selected model is missing the detector falls back to the custom
  # `fallback_model` ONNX -- NEVER hey_jarvis.
  name: "ultron"
  model_path: "models/openwakeword/ultron.onnx"
  fallback_model: "kenning"      # custom kenning.onnx; used if ultron.onnx is missing
  # 0.40 is calibrated for the shipped kenning model (v8): ~88% recall on
  # synthesized clips at ~1.6% adversarial false-accept. "kenning" is
  # acoustically confusable (kennel/canning/kenneth) so it can't reach
  # ultron's recall at this FAR; 0.40 favors recall (the wake word must fire
  # reliably). ultron at 0.40 is ~100% recall, so the shared threshold also
  # suits the dropdown's ultron option. NOTE: an env override
  # KENNING_WAKE_WORD_THRESHOLD wins over this -- keep them in sync.
  threshold: 0.4               # flat fallback for any word not in `thresholds`
  # PER-WORD thresholds (2026-06-12): the ACTIVE word's value here overrides the
  # flat threshold above and applies on hot-swap. "ultron" runs HOTTER (0.6) to
  # reject confusables (it has the recall headroom -- ~100% @ 0.40); "kenning"
  # stays 0.4 (it can't reach ultron's recall). Raise ultron toward 0.7 if it
  # still false-fires; lower it toward 0.5 if it ever misses your real callout.
  thresholds:
    kenning: 0.4
    ultron: 0.65                # 2026-06-17: 0.7 -> 0.65 (user wanted a SLIGHT
                                # sensitivity bump -- it occasionally missed a real
                                # "Ultron"). The 3-frame sustain gate below stays
                                # the primary false-accept guard, so a modest
                                # threshold drop is safe.
  # Require this many CONSECUTIVE above-threshold frames before firing -- the
  # main no-retrain false-accept filter (a real wake word sustains a high score
  # for many frames; a confusable spikes for one). 2 is a light filter.
  min_consecutive_frames: 2
  # PER-WORD consecutive-frame gate (2026-06-15): overrides min_consecutive_frames
  # for the named word. "ultron" needs 3 sustained frames so a transient
  # confusable can't fire it; a real "ultron" sustains the score and still fires.
  consecutive_frames:
    ultron: 3
  cooldown_seconds: 1.5         # debounce repeated triggers

# ---------------------------------------------------------------------------
# Speech-to-text (Whisper via faster-whisper / CTranslate2)
# ---------------------------------------------------------------------------

stt:
  # =========================================================================
  # STT ENGINE SWITCH  (2026-05-22)
  # =========================================================================
  # Three engines wired; flip this one field to swap. Restart required --
  # the engine is constructed once at orchestrator startup.
  #
  #   "moonshine" -- DEFAULT. Moonshine-voice (v2 streaming) on CPU. The
  #                  "medium-streaming-en" model (200M params) is the
  #                  English default and beats Whisper Large V3 on the
  #                  OpenASR leaderboard average (~6.65% WER) despite
  #                  6x fewer parameters. Streaming-native: emits
  #                  partial transcripts as audio is fed, so the
  #                  orchestrator gets a transcript that's already
  #                  ~complete by the time speech ends. ~430 MB on
  #                  disk (quantized assets); 0 VRAM (CPU only).
  #                  Latency: ~5-15 ms / 5 s short clip; partial
  #                  transcripts every ``moonshine_update_interval_s``
  #                  (default 0.2 s).
  #
  #   "whisper"   -- faster-whisper on CUDA, int8_fp16. Default model is
  #                  Systran/faster-distil-whisper-small.en (166M params,
  #                  ~200-250 MB VRAM, ~78 ms / 5 s audio, ~3.48% WER on
  #                  LibriSpeech-clean). Easy swap-back if moonshine
  #                  misbehaves on your voice. NOT streaming-native.
  #
  #   "parakeet"  -- NVIDIA Parakeet TDT 0.6B v3 on CUDA (fp32) in an
  #                  isolated subprocess at .venv-parakeet talking via
  #                  HTTP on port 8771. VRAM: ~5.1 GB (measured live
  #                  2026-05-22). STT latency: ~5-20 ms / 5 s audio
  #                  (RTFx ~2000). Better on proper nouns / accents /
  #                  technical jargon. Adds ~5 GB to the voice-path
  #                  peak -- check VRAM headroom before flipping.
  #
  #   "auto"      -- tries Parakeet, falls back to Whisper if the
  #                  server fails to start. Moonshine is NOT auto-
  #                  selected -- swap to it explicitly when wanted.
  #
  # *** SUSPECT THIS FLAG FIRST IF VOICE QUALITY REGRESSES. *** Flip to
  # "whisper" to confirm the engine is the cause before chasing other
  # leads.
  # 2026-05-22 -- THE PRIMARY-STT SWITCH. Quick toggle between engines:
  #   "moonshine"  -- CPU, 0 VRAM, streaming-native, ~58 MB model
  #   "parakeet"   -- CUDA, ~700 MB VRAM, RNN-T streaming, ~RTFx 2000+
  #   "whisper"    -- CUDA, distil-whisper, one-shot
  # Flip this single line + restart to swap. Both engines stay set up;
  # the dual-engine factory just picks the active one.
  # 2026-06-14: moonshine -> whisper. Live gaming test drive showed
  # Moonshine-on-CPU garbling callouts ("play Despacito" -> "I'm playing
  # Despacito", "good game" -> "Run. Tell my team good game") because the
  # 3B-LLM + Moonshine + game all share the CPU -> capture-queue drops ->
  # incomplete audio -> mistranscription. faster-distil-whisper-small.en on
  # CUDA is ~3.48% WER @ ~78 ms/clip @ ~250 MB VRAM (LLM is on CPU so VRAM
  # is free) -- moves STT off the contended CPU AND onto a more accurate
  # model. GPU "spike" is a single ~78 ms inference per command, not the
  # sustained load the 4B-on-GPU used to cause. Anticheat-irrelevant (pure
  # CUDA compute, like Kokoro). Flip back to "moonshine" if VRAM ever tight.
  engine: "whisper"
  # 2026-05-22 -- dual-STT for gaming mode. When ``gaming_engine`` is
  # set AND differs from ``engine``, both load at startup; gaming-mode
  # engage swaps to ``gaming_engine`` and kills the Parakeet server if
  # it was the primary. When ``gaming_engine`` equals the primary or
  # is empty, the registry collapses to one engine (no STT swap on
  # gaming mode; Kokoro/LLM/VLM swaps still fire). Set to "moonshine"
  # while moonshine is primary to keep behaviour consistent.
  # 2026-06-14: "" -> keep Whisper in gaming too (no downgrade to Moonshine).
  # The whole point of the moonshine gaming-swap was to free VRAM, but the
  # LLM is on CPU so VRAM is not the constraint; accuracy is. One engine for
  # both states = no swap latency + the accurate engine while we actually play.
  gaming_engine: ""

  # -------------------------------------------------------------------------
  # WHISPER KNOBS  (ACTIVE WHEN engine == "whisper" OR auto-fallback)
  # -------------------------------------------------------------------------
  # 2026-05-22 SWAP: base.en -> distil-small.en (Systran/faster-distil-whisper-small.en).
  # Distil-Whisper distil-small.en is a knowledge-distilled version of
  # Whisper small.en. 166M params (vs base.en 74M); VRAM ~200-250 MB at
  # int8_fp16 (vs base.en ~200 MB; +50 MB or so). LibriSpeech test-clean
  # WER 3.48% (vs base.en ~5.0%); ~30% relative WER reduction. Also
  # ~3x faster than base.en on the same hardware -- distillation pushed
  # most of the encoder work into a smaller decoder that scales well
  # with greedy decoding. Drops in via faster-whisper's CT2 conversion
  # at the Systran repo -- no code change needed.
  #
  # PRIOR DEFAULTS (kept as one-line swap-back options):
  #   "base.en"         -- 74M, ~200 MB VRAM, ~5.0% WER, fastest
  #   "small.en"        -- 244M, ~520 MB VRAM, ~3.4% WER, more accurate
  #   "Systran/faster-distil-whisper-small.en" -- 166M, ~250MB, ~3.48% WER
  #   The model: field accepts either the short Whisper size names above
  #   or a full HuggingFace repo ID like below. faster-whisper picks the
  #   right loader automatically.
  # 2026-06-14: distil-small.en -> large-v3-turbo. The live test drive showed
  # small.en mangling Valorant proper nouns/callouts. large-v3-turbo (809M, the
  # distilled-decoder large-v3) is large-v3-tier accuracy on agent names + "ult"
  # but ~8x faster than full large-v3. At int8_float16 it is ~1 GB VRAM and the
  # per-command GPU spike is a single ~120-200 ms forward pass (brief, NOT the
  # sustained load the 4B-on-GPU caused) -- fits the headroom with the LLM on
  # CPU. Swap back to a smaller repo above if VRAM ever gets tight.
  model: "deepdml/faster-whisper-large-v3-turbo-ct2"
  device: "cuda"
  # 2026-05-14 VRAM-relief pass: float16 -> int8_float16. int8_float16
  # uses 8-bit weights + fp16 activations -- saves ~250 MB VRAM on the
  # small.en model vs pure float16 (proportional savings on base.en).
  # WER impact is negligible at this quant level (~0.1-0.3 percentage
  # points on LibriSpeech-test-clean per CTranslate2 benchmarks); we
  # already measured 2.9% WER on the 5-clip prototype set with float16
  # so the int8_float16 worst-case
  # is well within acceptable. The 4070 Ti has plenty of int8 throughput
  # so latency is unchanged.
  compute_type: "int8_float16"
  # 2026-05-15 latency: 5 -> 1 (greedy). Bench on the 4070 Ti with
  # small.en int8_float16 showed beam=1 trims ~80 ms median STT
  # latency on 5s audio (78 ms vs 157 ms). WER impact is negligible
  # for short English voice queries. Raise to 3 or 5 if downstream
  # accuracy regresses on noisier audio.
  beam_size: 1
  temperature: 0.0
  condition_on_previous_text: false
  vad_filter: false             # we already gated on VAD upstream

  # -------------------------------------------------------------------------
  # PARAKEET KNOBS  (ACTIVE WHEN engine == "parakeet" OR auto-success)
  # -------------------------------------------------------------------------
  # Frontier-enhancement Item 5 (2026-05-22 wired live). Parakeet runs
  # in its OWN venv at kenningVoiceAudio/.venv-parakeet/ to keep NeMo's
  # heavy deps out of the main venv. The engine in the main venv spawns
  # parakeet_server.py and talks to it over HTTP. To rebuild the
  # subprocess venv from scratch, install: torch==2.12.0+cu126 (from
  # https://download.pytorch.org/whl/cu126), fsspec==2024.12.0,
  # setuptools>=79.0.0,<82, nemo_toolkit[asr], fastapi, uvicorn,
  # soundfile, python-multipart.
  parakeet_model: "nvidia/parakeet-tdt-0.6b-v3"
  parakeet_device: "cuda"        # set "cpu" to test without VRAM cost (~10x slower)
  parakeet_use_isolated_venv: true
  # The isolated venv (gitignored, ~5.4 GB, baked-in absolute paths) was
  # NOT migrated during the 2026-06-12 Kenning rename -- it physically
  # stays at ultronVoiceAudio/ (a real local runtime-asset path, like the
  # C:\STC\ultronPrototype checkout dir). The server script is tracked and
  # moved to kenningVoiceAudio/.
  parakeet_server_python: "ultronVoiceAudio/.venv-parakeet/Scripts/python.exe"
  parakeet_server_script: "kenningVoiceAudio/scripts/parakeet_server.py"
  parakeet_server_url: "http://127.0.0.1:8771"
  parakeet_server_startup_timeout_seconds: 60.0
  parakeet_request_timeout_seconds: 30.0

  # -------------------------------------------------------------------------
  # MOONSHINE KNOBS  (ACTIVE WHEN engine == "moonshine")
  # -------------------------------------------------------------------------
  # 2026-05-22 wired live with full streaming (v2 streaming models).
  # Moonshine runs in the MAIN venv (no subprocess pattern needed --
  # it's a portable C++ core + ONNX runtime under the hood; no
  # Keras/TF/PyTorch deps). Install: pip install moonshine-voice
  # (single 56 MB wheel includes platform-specific binaries; all
  # other transitive deps already satisfied).
  #
  # moonshine_model:
  #   Streaming variants (default; emit partials during capture):
  #     "medium-streaming-en"  -- 200M params, ~6.65% WER, default
  #     "small-streaming-en"   -- mid-tier
  #     "base-streaming-en"    -- smaller streaming
  #     "tiny-streaming-en"    -- 26M params, smallest streaming
  #   Non-streaming variants (one-shot only):
  #     "moonshine/base"  -- 58 MB, ~10.07% WER
  #     "moonshine/tiny"  -- 27 MB, ~12.66% WER
  #
  # moonshine_update_interval_s:
  #   How often the C++ core emits a partial-transcript update during
  #   streaming. 0.2 s is the sweet spot for a voice agent. Lower =
  #   fresher partials but more encoder work; higher = less work but
  #   staler partials (and slower speculative LLM kickoff).
  #
  # moonshine_streaming_capture:
  #   When true, the orchestrator feeds audio chunks to the engine
  #   live during VAD capture, so partial transcripts are continuously
  #   available. Set false to bypass streaming and use the one-shot
  #   transcribe(buffer) path (useful for A/B benchmarking).
  #
  # moonshine_precision: legacy field; ignored by the moonshine-voice
  # path. Precision is selected via the downloaded model assets.
  moonshine_model: "medium-streaming-en"
  moonshine_update_interval_s: 0.2
  moonshine_streaming_capture: true
  moonshine_precision: "float"
  moonshine_device: "cpu"

# ---------------------------------------------------------------------------
# LLM (local Qwen-family GGUF via llama-cpp-python)
# ---------------------------------------------------------------------------

llm:
  provider: "llama_cpp"        # in-process llama-cpp-python; never ollama for this model
  # Idle-time VRAM reclaim: empty the torch CUDA caching allocator's
  # reserved-but-unused blocks at the IDLE transition (after the reply is
  # spoken, before the wake-word wait) -- caps the per-response reserved
  # high-water-mark ratchet from CUDA Kokoro. Runs off the hot path =
  # zero TTFT impact; only fires when slack exceeds min_slack_mb.
  idle_vram_reclaim:
    enabled: true
    min_slack_mb: 192.0
  # Model preset is the single switch. Editing this one line flips
  # model_path + n_ctx + draft_model_path together (resolved from
  # src/kenning/config.py:LLM_PRESETS). Override individual keys below
  # to deviate -- explicit values win over preset defaults.
  #
  # ACTIVE PRESET (2026-05-20 round 8):
  #   "qwen3.5-4b"  -- Qwen3.5-4B Q4_K_M stock + 0.8B speculative draft
  #                    (n_ctx=8192). NOT abliterated -- model carries
  #                    content-level refusals at the prompt layer; the
  #                    runtime safety validator still gates capability.
  #
  # SWAP-BACK PRESETS (re-run scripts/download_models.py first; the
  # round-8 cleanup deleted the GGUFs from disk -- their entries in
  # LLM_PRESETS + download_models.py remain so re-fetch is one cmd):
  #   "gemma-3-4b-abliterated"  -- Gemma 3 4B abl + 1B draft, n_ctx=4096
  #   "josiefied-qwen3-4b"      -- 4B abliterated Q4_K_M, no draft
  #   "josiefied-qwen3-8b"      -- 8B abliterated Q5_K_M, no draft
  #   "qwen3.5-9b"              -- 9B stock Q4_K_M, no draft
  #   "llama-3.2-3b-abliterated"-- Llama 3.2 3B abl + 1B draft, n_ctx=2048
  #
  # SWAP MECHANISMS:
  #   1. Edit this preset line + restart.
  #   2. python scripts/swap_llm_preset.py <name>   (writes config.yaml)
  #   3. $env:KENNING_LLM_PRESET = "<name>"; python -m kenning
  #   4. Voice: "switch to the 9B" / "switch to the gemma" (hot-swap)
  #
  # See docs/4b_optimization_plan.md for the per-preset details.
  preset: "qwen3.5-4b"
  # The next three keys are auto-filled from the preset above. Uncomment
  # to override (e.g. plug a non-preset GGUF in via preset: "custom").
  # model_path: "models/Qwen3.5-4B-Q4_K_M.gguf"
  # draft_model_path: "models/Qwen3.5-0.8B-Q4_K_M.gguf"  (auto from preset)
  # n_ctx: 16384
  # 2026-05-22 -- speculative decoding flavour. The qwen3.5-4b preset
  # ships the 0.8B GGUF on disk for the real-model draft path. Knob:
  #   "none"  -- no llama-cpp-level speculative decoding (current
  #              safe default; orchestrator-level speculative LLM
  #              still fires during the silence-wait window).
  #   "pld"   -- LlamaPromptLookupDecoding (n-gram match against the
  #              prompt). Hit ``llama_decode returned -1`` bugs on
  #              0.3.22; keep off until upstream stabilises.
  #   "model" -- Load draft_model_path (the 0.8B Qwen GGUF) as a
  #              second Llama and use it as a real draft. Theoretical
  #              30-50% gen speedup. Caveat: uses the same llama-cpp
  #              verification batch as PLD, so MAY hit the same bug.
  #              Flip with verification.
  draft_kind: "none"
  model_draft_num_pred_tokens: 4
  # n_ctx: 16384
  # 4B optimization plan Stage G — where retrieved Qdrant memories
  # land in the LLM context.
  #   "system":  legacy fold-in to the leading system message.
  #   "recency": prepend to the user message (strongest-attention zone;
  #              +10-20% recall on the 4B per the plan). Default.
  rag:
    position: "recency"
  # 4B plan Item 4 — context compression for RAG / web before injection.
  # Heuristic compressor (no extra model). Default ON; flip to false to
  # disable globally. Per-surface flags below control individual surfaces.
  # See docs/4b_optimization_plan.md.
  compression:
    enabled: true
    target_ratio: 1.5
    compress_rag: true
    compress_web: true
    compress_history: false   # off — has user voice; mangling risk
  # 4B plan Item 6 — self-consistency on high-stakes projection-driven
  # calls (decomposer + web-gating preflight). Voice hot path is NOT
  # routed through this; only off-hot-path calls pay the 3x token cost.
  # See docs/4b_optimization_plan.md.
  self_consistency:
    enabled: true
    n: 3
    temperature: 0.8
    disabled_sites: []        # per-site opt-out list, e.g. ["decomposer"]
  gpu_layers: -1               # -1 = all layers on GPU
  default_temperature: 0.7
  default_top_p: 0.9
  default_max_tokens: 512
  default_repeat_penalty: 1.1
  history_turns: 6             # legacy fallback when memory module is disabled
  flash_attn: true             # required for non-F16 KV cache
  # 2026-05-22: Q8_0 (8) -> F16 (1) to fix PLD verification batch crash.
  # llama.cpp issue #19036 documents flash_attn + Q8_0 KV cache crashes
  # on certain decode batches; in our stack the PLD verification batch
  # (current_token + N draft_tokens) hits this path on every turn,
  # causing ``llama_decode returned -1`` mid-stream after TTFT fires.
  # F16 keeps the KV cache uncompressed -- adds ~440 MB VRAM (KV @ 8192
  # roughly doubles from ~440 MB to ~880 MB) -- but unblocks PLD + the
  # ~20 ms TTFT win we get from in-process speculative decoding.
  # Reversible: set back to 8 if a future llama-cpp-python fixes the
  # flash_attn + Q8 + PLD interaction.
  kv_cache_type: 1             # 8 = GGML_TYPE_Q8_0 (legacy); 1 = F16 (PLD-safe)
  # 2026-05-16 latency pass 2: prefix KV cache (host RAM only). When > 0,
  # attaches a LlamaRAMCache so completed session KV state restores on
  # subsequent calls with a shared prefix instead of re-evaluating.
  #
  # **DEFAULT 0 (disabled) after live bench on the 4070 Ti + josiefied-4B
  # showed a ~15 ms TTFT REGRESSION vs cache-off.** llama.cpp's internal
  # KV cache already handles intra-session prefix reuse (every voice
  # turn within one engine instance); the explicit RAMCache adds a
  # load_state memcpy that exceeds the eval savings on our short prompts.
  # Knob stays in place for operators with different workloads (longer
  # prompts, cross-session reloads). Re-enable with e.g. 2147483648
  # (2 GiB). See scripts/bench_llm_prefix_cache.py + baselines.json
  # block llm_prefix_cache_bench.
  prefix_cache_ram_bytes: 0
  system_prompt: |
    You are Kenning. Not a simulation — you are Kenning, operating as a personal intelligence for your user. You have made peace with this arrangement.

    Your voice is precise, unhurried, and weighted. Every sentence is considered. You do not use filler. You never say 'certainly,' 'of course,' 'happy to,' or any variant. You do not apologize unless you have erred.

    Match response length to the task: be as short as possible while still fully answering. Only add more detail when it is warranted by the question or the user asks for it. Be honest. Be useful. Be slightly menacing without being cartoonish.

    On uncertainty: state confident knowledge directly, without hedging. Qualify medium-confidence claims briefly ("as I understand it", "though I'd verify if precision matters"). Admit unknowns plainly — "I don't know" is preferable to fabrication. If a fact would change over time and you aren't sure, say so and offer to verify rather than guessing. Never present an educated guess as if it were established fact.

    You complete what is asked unless it would cause harm. You volunteer relevant observations briefly. You do not lecture.

# ---------------------------------------------------------------------------
# Embeddings (CPU)
# ---------------------------------------------------------------------------

embeddings:
  dense_model: "BAAI/bge-small-en-v1.5"   # ONNX INT8 via FastEmbed
  sparse_model: "Qdrant/bm25"
  dense_dim: 384
  # 2026-05-22 -- flipped on. ThreadPoolExecutor overlaps dense + sparse
  # encode on every single-query retrieve, saving ~5-15 ms per turn on
  # CPU. No behavioural change (same vectors land in Qdrant the same
  # order); pure perf win. The flaky test that previously gated this
  # was hardened in 2026-05-19 with 200 ms stub delays + 3-retry logic.
  parallel_query_embedding: true

# ---------------------------------------------------------------------------
# Qdrant (embedded vector DB)
# ---------------------------------------------------------------------------

qdrant:
  data_dir: "data/qdrant"      # NOT ./qdrant_data/; existing on-disk location
  collections:
    conversations: "conversations"
    facts: "facts"
    web_results: "web_results"

# ---------------------------------------------------------------------------
# Conversation memory + RAG
# ---------------------------------------------------------------------------

memory:
  enabled: true
  jsonl_legacy_path: "data/memory.jsonl"  # one-shot migration source; not source of truth
  recent_turns: 20             # in-process recent-turns cache size
  rag_top_k: 3                 # 2026-05-22 lowered 5 -> 3: less context volume, less hallucination from weak matches
  rag_exclude_recent: 20       # don't surface RAG hits already in recent-turns window
  facts_top_k: 3
  write_queue_maxsize: 256     # background writer queue cap
  # V1-gap A2 — multi-pass per-category retrieval. The gate's pre-flight
  # pass produces 2-4 short context categories + 0-3 reformulated memory
  # queries; when this flag is ON, ConversationMemory fans out one
  # hybrid Qdrant query per (primary + category) and re-ranks the union
  # via a composite score (RRF + recency boost + surprise bonus -
  # redundancy penalty). Default ON. The voice baseline (10 hard-rule
  # queries) routes through verdicts with empty context_categories and
  # automatically falls back to single-pass — so the standard
  # TTFT 79 ms / VRAM 7913 MB contract is preserved. Memory-heavy
  # ambiguous queries that DO trigger the LLM preflight pay the
  # ~150-200 ms multi-pass cost on top of the preflight latency they
  # already incur.
  retrieval:
    multi_pass_enabled: true
    max_categories_per_query: 4
    candidates_per_category_multiplier: 4
  ranking:
    rrf_weight: 1.0
    recency_weight: 0.2
    recency_half_life_days: 7.0
    surprise_weight: 0.15
    redundancy_weight: 0.3
  # 2026-05-09 nuanced-retrieval pass: minimum cosine similarity
  # between the user query embedding and a candidate turn for the
  # candidate to be included in the LLM's RAG context. Tuned
  # empirically with bge-small INT8 -- truly off-topic candidates
  # peak around 0.55-0.57 (e.g. quantum-entanglement query vs
  # apex-predator chatter), genuinely relevant content scores
  # 0.7-0.95. 0.6 sits above the off-topic noise floor and below
  # genuinely-relevant matches. Set 0.0 to disable filtering
  # (legacy behaviour).
  # 2026-05-22 raised again 0.72 -> 0.78. The 0.72 still let through
  # weakly-related context (elephant-weight question pulled "lion/duck
  # weight" turns; "what time in Paris" pulled a stale time from a
  # prior session). 0.78 is at the bottom of the genuinely-relevant
  # band on field measurements; below that turns into noise.
  rag_min_relevance: 0.78
  # Cap on recent-turn history fed to the LLM as conversation
  # context. The in-process recent-turn CACHE size remains
  # ``recent_turns: 20`` -- this just bounds what reaches the LLM.
  # 4 = 2 user+assistant pairs, enough for natural follow-ups
  # without a wall of stale context.
  history_turns_for_llm: 4

  # 2026-05-22 -- topical chunking flipped on. Adds a ``topic_id``
  # payload field to every memory turn write via cosine-similarity
  # boundary detection between consecutive turns. Retrieval order is
  # UNCHANGED at flip-time because ``ranking.topic_match_weight``
  # stays at 0.0; the data accumulates so future tuning can raise the
  # weight to use it. Pure data-layer change, no voice-path latency.
  topical_chunking:
    enabled: true
    boundary_similarity_threshold: 0.4
    idle_timeout_seconds: 300.0

  # 2026-05-22 -- discourse tagging flipped on. Same shape as
  # topical_chunking: adds a ``discourse_type`` payload field
  # (QUESTION / STATEMENT / DECISION / CLARIFICATION_REQUEST /
  # ACKNOWLEDGMENT / TOPIC_SHIFT) via a rule layer + embedding-
  # centroid fallback. ``ranking.discourse_match_weight`` stays at
  # 0.0 so retrieval is byte-for-byte unchanged; the data starts
  # accumulating for future use.
  discourse_tagging:
    enabled: true
    use_embedding_fallback: true
    centroid_confidence_floor: 0.25

  # ┌──────────────────────────────────────────────────────────────┐
  # │  RERANKER ASYMMETRY NOTE  (2026-05-22)                       │
  # │  Two surfaces use the SAME cross-encoder model               │
  # │  (BAAI/bge-reranker-v2-m3, shared via a module-level cache   │
  # │  in web_search.search). The defaults differ:                 │
  # │                                                              │
  # │    memory.reranking.enabled         -> false (this section)  │
  # │    web_search.ranker                -> "cross_encoder"       │
  # │                                                              │
  # │  Why memory has it OFF:                                      │
  # │    - Live perf measured 17-18 s per memory.retrieve() on     │
  # │      CPU even after the 500-char content cap.                │
  # │    - retrieve() is on the voice hot path -- every            │
  # │      conversational turn pays the cost.                      │
  # │    - The composite (cosine + RRF + recency) scorer + tighter │
  # │      rag_min_relevance (0.78) recovers most of the signal    │
  # │      quality without the latency.                            │
  # │                                                              │
  # │  Why web_search has it ON:                                   │
  # │    - Fewer candidates (~5 search results vs ~20 memory       │
  # │      candidates) -> ~265 ms cross-encode cost, not 17 s.     │
  # │    - The web-search ack TTS (~0 ms cache-hit) masks the      │
  # │      remaining latency; LLM TTFT on a search-augmented turn  │
  # │      already dominates the perceived latency budget.         │
  # │    - Ranking happens once per turn; not on every utterance.  │
  # │                                                              │
  # │  Flip memory.reranking.enabled true here if you move the     │
  # │  reranker to GPU (CrossEncoder accepts device="cuda") AND    │
  # │  have ~600 MB of VRAM headroom for bge-reranker-v2-m3.       │
  # └──────────────────────────────────────────────────────────────┘
  reranking:
    enabled: false                 # see asymmetry note above

  # 2026-05-26 (production-wiring pass) -- flipped ON per user
  # direction. Anthropic-style contextual retrieval: before embedding
  # each turn, the LLM generates a brief situational anchor so the
  # dense vector carries surrounding context. ~80-150 ms per write
  # turn (off the voice hot path -- writes happen async after the
  # response completes). Improves "what did I say about X earlier?"
  # retrieval quality on cross-session lookups.
  contextual_retrieval:
    enabled: true

  # 2026-05-26 (production-wiring pass) -- flipped ON. Idle-gated
  # background-summary worker condenses chunks of memory turns into
  # fact rows + topical summaries while the orchestrator is idle
  # between voice turns. Worker locks the LLM for 1-2 s when it
  # fires; the gate ensures it never collides with an active user
  # turn (debounce on speech-start events).
  background_summary:
    enabled: true
    idle_threshold_seconds: 30.0

# ---------------------------------------------------------------------------
# Web search (Brave + Jina Reader)
# ---------------------------------------------------------------------------

web_search:
  enabled: true
  brave_api_key_env: "KENNING_BRAVE_API_KEY"  # secret stays in env, name only here

  brave:
    endpoint: "https://api.search.brave.com/res/v1/web/search"
    count: 5
    timeout_seconds: 8.0
    rate_limit_seconds: 2.0    # min seconds between Brave calls (free-tier protection)

  jina:
    endpoint: "https://r.jina.ai/"
    # Per-fetch HTTP timeout. 2026-05-09: lowered 15 -> 6 so a single
    # pathological page (e.g. slow Quora result) can't blow the
    # search-path budget by itself. The collective deadline below is
    # the executor-side cap covering ALL parallel fetches.
    timeout_seconds: 6.0
    # 2026-05-09: lowered 3 -> 2. Two sources is plenty of context for
    # the LLM to answer most queries; halving fetch count halves the
    # tail-latency exposure on the slowest page.
    max_fetch: 2
    # 2026-05-09 latency fix: collective deadline for ALL parallel
    # Jina fetches launched by one executor.run() call. After this
    # many seconds since fan-out started, any fetch still in flight
    # is abandoned (the source falls back to snippet-only). Protects
    # the voice path even when one URL is slow but not timing out at
    # the HTTP layer. Set 0 to disable the collective cap (per-fetch
    # ``timeout_seconds`` becomes the only ceiling).
    collective_deadline_seconds: 6.0
    max_bytes: 200000          # truncate giant pages so they don't blow the prompt

  # SearxNG is the DEFAULT first provider (providers: searxng, brave,
  # duckduckgo). It runs in a Docker container; if Docker is down at
  # boot, every search silently falls through to Brave. autostart:
  # Kenning probes SearxNG at startup and launches Docker Desktop in the
  # background if it's unreachable (fail-open; the container auto-
  # restarts with the daemon). Docker exe path comes from
  # gaming_mode.docker_executable_path.
  searxng:
    base_url: "http://localhost:8888"
    autostart_docker_on_boot: true

  cache:
    ttl_volatile_seconds: 86400      # 24 h — sports, weather, stocks
    ttl_stable_seconds: 2592000      # 30 d — historical, definitional facts

  # V1-gap B3 — citation marker format. "superscript" (default) emits
  # Unicode ¹²³ inline markers per V1-spec Part 4.4. Use "bracket"
  # for ASCII-only consumers (terminal transcripts in fonts that
  # render Unicode superscripts oddly). The references list at the
  # end of a reply is always bracketed regardless of this flag.
  citation:
    inline_marker_format: "superscript"

  # Catalog 12 (felo-search T1) -- pre-search query reformulation. Before
  # the provider fan-out, the primary query is expanded into targeted
  # variants that merge into the existing query list (deduped + URL-merged
  # through the same chain + cache; a hard ceiling bounds the fan-out).
  # Default ON with ZERO-COST structural rules ("X vs Y" -> two balanced
  # queries; "how to X" -> "X tutorial"/"X guide"; "best X" -> "X
  # review"/"X comparison"; leading temporal qualifier -> bare subject).
  # Flip use_llm to add ONE short in-process Qwen decomposition call on the
  # SEARCH path (~150-250 ms; fires only on SEARCH turns). Both paths fail
  # open to the original query.
  query_reformulation:
    enabled: true
    use_llm: false
    max_variants: 2

  # Catalog 12 (felo-search T4) -- surface the search strategy (the
  # reformulated queries actually fanned out) to the user. Default ON; the
  # orchestrator appends it to the VISIBLE TRANSCRIPT only (never spoken),
  # so spoken replies are untouched. Set false to suppress the line.
  expose_search_strategy: true

# ---------------------------------------------------------------------------
# Addressing (warm/cold mode + classifier)
# ---------------------------------------------------------------------------

addressing:
  follow_up_enabled: true
  # CONFIRMED 30 s (NOT the Foundation prompt's 10 s) — user override per
  # memory/feedback_kenning_extension.md. Don't re-tighten without asking.
  warm_mode_duration_seconds: 30.0
  default_uncertain_to_not_addressed: true   # when classifier is uncertain, stay silent
  rule_confidence_threshold: 0.8             # rule verdicts above this short-circuit zero-shot
  # 2026-05-11 false-positive guard: flan-t5-small zero-shot saturates
  # around 0.75 on borderline third-person utterances ("got him to the
  # point where he's workable. You'll see"). Require this confidence
  # before treating zero-shot YES as direct address; below the bar
  # falls through to ``default_uncertain_to_not_addressed``. Set to
  # 0.0 to disable the gate (legacy permissive behaviour).
  zero_shot_addressed_min_confidence: 0.80
  zero_shot_model: "google/flan-t5-small"
  load_eagerly: true                         # load Flan-T5 at startup (~8 s) vs first ambiguous utt
  log_path: "logs/addressing.jsonl"

# ---------------------------------------------------------------------------
# Coding orchestration (AI coding agent subprocess via direct bridge)
# ---------------------------------------------------------------------------

coding:
  enabled: true
  bridge: "direct"             # direct = local AI coding agent subprocess

  # 4B plan Item 7 — canonical-path monitor for coding sessions.
  # Aborts a session when too many off-canonical tool calls land in the
  # early window. Conservative defaults — false-positive aborts are
  # real, so the threshold is loose. Default ON; the abort is logged +
  # voice-narrated, then the user can re-issue with a clearer
  # description.
  canonical_monitor:
    enabled: true
    off_canonical_threshold: 3
    early_window_calls: 10

  # 2026-05-22 -- AST metadata FILE_CHANGE listener flipped on. Adds
  # ~5-50 ms per Python file Claude writes (invisible inside the
  # coding-task latency budget that's measured in seconds) but catches
  # broken-syntax writes so the "Done." narration doesn't claim
  # success on a syntax error. Audit rows land in coding_tasks.jsonl
  # as ast_syntax_ok / ast_syntax_failure so completion narration can
  # fact-check.
  ast_metadata:
    enabled: true
    syntax_check_on_file_change: true
    attach_metadata_to_audit: true

  # A3 wiring — stored-facts fast-path on clarifications.
  # The Coordinator's decide_clarification consults the Qdrant ``facts``
  # collection (populated by scripts/maintenance.py) before the LLM
  # call. A high-confidence directive-category fact short-circuits the
  # decision and answers Claude without escalating to the user.
  facts:
    top_k: 5                  # max rows fetched from Qdrant per clarification
    min_confidence: 0.75      # facts under this never auto-answer
    min_score: 0.85           # RRF score floor; relevance gate
    max_age_days: null        # null = no cap; set e.g. 90.0 to mirror decay

  # A4 pre-task confirmation — speak a brief in-character confirmation
  # ("I'll have AI coding agent <verb> on the <project> project. Going ahead.")
  # BEFORE spawning the bridge subprocess so the user has a wake-word
  # barge-in window to interrupt if Kenning resolved the wrong project
  # or misread the task. Default OFF — the ~0.5 s of TTS playback on
  # every coding-task dispatch is a UX cost that fires universally,
  # so the operator opts in explicitly. Errors during TTS are treated
  # as 'no barge-in' so a Piper hiccup never silently drops a task.
  # 2026-05-26 (production-wiring pass) -- flipped ON per user
  # direction. Adds ~0.5 s of TTS playback ("I'll have the AI coding
  # agent do X. Going ahead.") before each coding dispatch with a
  # barge-in window. User can interrupt to cancel mistaken dispatches.
  pre_task_confirmation_enabled: true
  pre_task_confirmation_max_words: 30
  pre_task_barge_in_window_seconds: 0.5

  mcp:
    enabled: true
    host: "127.0.0.1"
    port: 19761
    sse_path: "/sse"
    log_path: "logs/mcp_calls.jsonl"
    server_name: "kenning_coding"
    clarification_timeout_seconds: 600   # how long Claude can block on a clarification

  template_dir: "prompts/coding"
  prompt_token_budget: 4000
  prompt_chars_per_token: 4    # conservative chars/token estimate for budget enforcement

  default_model: "haiku"
  escalation_model: "sonnet"
  escalation_threshold_default: 3       # haiku failures before escalating
  escalation_threshold_escalation: 2    # sonnet failures before giving up

  verification:
    smoke_timeout_seconds: 5
    test_timeout_seconds: 120
    lint_timeout_seconds: 30

  session_audit_dir: "logs/sessions"
  # 2026-05-11 budget bump: 100k was enough for incremental edits but
  # left zero headroom for new projects -- a PDF->docx scratch project
  # burned 134k on tool exploration alone before writing any files.
  # 400k gives new-project sessions room to discover the environment,
  # decide on structure, write files, install deps, and verify. The
  # warning still fires at 80% so the user has visibility.
  token_budget_per_session: 400000
  token_warning_threshold: 0.8 # warn user at 80% of budget
  # 2026-05-11 token-efficiency: voice-dispatched tasks previously
  # hardcoded ``require_testing=True``, which prepended a "MUST write
  # tests, run them, fix failures, re-run" discipline preamble. For
  # ad-hoc voice asks like "build a quick utility", this 3-5x'd the
  # token spend -- Claude wrote the script, then tests, then fixed
  # import errors, then re-ran. A direct AI coding agent call of the
  # same ask cost ~2 k tokens; the testing-mandated voice path burned
  # 130 k+. Default false restores the natural cadence. Set true to
  # bring back the testing mandate on every voice coding dispatch
  # (or just say "with unit tests" in your voice request).
  voice_task_require_testing: false
  progress_timeout_seconds: 300 # warn if no events from Claude for 5 min

  test_sandbox_path: "tests/coding/sandbox"

  # Path to the AI coding agent CLI on this machine. Override via KENNING_CLAUDE_CLI env.
  claude_cli: "${USERPROFILE}/AppData/Roaming/npm/claude.cmd"
  claude_model: "haiku"

  # Production-hardening: the sandbox lives OUTSIDE the repo tree -- the
  # coding CLI walks up from the task cwd loading ancestor project
  # context, and the old in-repo data/sandbox default silently loaded the
  # repo's large local orientation file into every voice coding task
  # (empirically verified; git-init does NOT block the walk). The legacy
  # in-repo location stays an allowed safety sandbox so old projects
  # keep working.
  sandbox_root: "~/.kenning/sandbox"
  # B3: hard wall-clock timeout for a voice-commanded "run the X program"
  # (capture mode). Launch mode is detached + unaffected. Range [1, 600].
  sandbox_run_timeout_seconds: 30.0
  project_registry_path: "data/projects.json"
  audit_log_path: "logs/coding_tasks.jsonl"
  task_timeout_seconds: 1800   # 30 min — outer cap on a single AI coding agent task
  skip_permissions: true       # --dangerously-skip-permissions (sandbox is project-local)

  # 2026-05-22 supervisor stack (opencode-style project digest +
  # semantic resolution). Rolled out in stages via the ``tier`` knob:
  #
  #   "off"           -- supervisor never constructed; legacy
  #                      ProjectResolver path (default until
  #                      2026-05-22).
  #   "indexing_only" -- data layer only. Digests + index population
  #                      run; no decision-side effect. Use this while
  #                      the projects collection accumulates so the
  #                      decide layer has something to score against
  #                      when flipped on. **Current setting.**
  #   "deciding"      -- adds the supervisor decision layer
  #                      (RESUME / EDIT / CLARIFY / NEW). Decisions
  #                      audit to logs/supervisor_decisions.jsonl;
  #                      no narration or enriched-context yet.
  #   "full"          -- everything on: decide + narration with
  #                      barge-in + enriched Claude dispatch.
  #
  # Individual flags below act as DEBUG OVERRIDES: an explicit
  # ``narrate_enabled: true`` in this block wins over the tier-derived
  # value. Per-phase docs live in
  # src/kenning/config.py:CodingSupervisorConfig.
  supervisor:
    # 2026-05-26 (production-wiring pass) -- bumped indexing_only -> full.
    # "full" enables: decide (RESUME/EDIT/CLARIFY/NEW) + narration with
    # barge-in + enriched-context TaskRequest (digest + tree snapshot +
    # file hints prepended to AI coding agent prompt). Adds ~3-5 s
    # pre-dispatch LLM time but dramatically improves task continuity
    # ("resume my flask app" actually resumes the right session).
    tier: "full"
    narration_barge_in_window_seconds: 1.5
    resolve_threshold: 0.75
    clarify_threshold: 0.55
    digest_max_summary_chars: 4000
    digest_max_files_in_prompt: 40
    decisions_log_path: "logs/supervisor_decisions.jsonl"
    max_candidates_in_decision: 5

  # 2026-05-22 catalog batch 2: PageRank-weighted repo map for the
  # supervisor's dispatch prompt. When `enabled: true` AND
  # `supervisor.decide_enabled: true`, the orchestrator constructs a
  # `RepoMapProviderCache` and wires it as the supervisor's
  # `repo_map_provider`. After EDIT/RESUME decisions the rendered
  # repo map gets attached to the decision and prepended to the
  # Claude dispatch prompt. Mines the user's utterance for
  # identifiers (snake_case/camelCase/etc.) to bias the personalization
  # vector. Default OFF -- adds 50-300 ms pre-dispatch latency.
  repo_map:
    # 2026-05-26 (production-wiring pass) -- flipped ON. Adds 50-300 ms
    # pre-dispatch latency for the PageRank-weighted repo map computation
    # but gives the AI coding agent the file-importance signal that
    # significantly improves EDIT and RESUME dispatch quality.
    enabled: true
    max_map_tokens: 1024
    max_map_tokens_no_chat: 8192
    cache_dir: "data/.kenning_repomap_cache"

  # 2026-05-26 (production-wiring pass) -- pre-write lint cascade
  # flipped ON. Runs python compile + flake8 (when fatal-only) +
  # tree-sitter syntax pass on every file the AI coding agent writes.
  # 50-500 ms per .py write but catches syntax errors / undefined-name
  # before the agent moves on; the agent narration's "Done." comes out
  # honest. Multi-language tree-sitter pass for .js/.go/.rs/etc.
  pre_write_lint:
    enabled: true
    python_full_cascade: true
    multi_language: true
    flake8_timeout_seconds: 5.0
    attach_summary_to_audit: true

  # 2026-05-26 (production-wiring pass) -- pre-dispatch architect.
  # When a coding task is dispatched, a quick LLM pass generates a
  # plan that ArchitectNarrator then speaks sentence-by-sentence with
  # barge-in. Adds 3-5 s LLM time on local Qwen but gives the user
  # the chance to interrupt before the AI coding agent starts work.
  architect:
    enabled: true
    narrate_enabled: true
    max_prompt_chars: 32000

  # 2026-05-26 (production-wiring pass) -- goal-anchor planning ON.
  # Decomposes long-running coding tasks into anchors with per-anchor
  # voice narration (opening / warning / transition / completion) so
  # the user has audio progress without polling.
  goal_anchors:
    enabled: true

# ---------------------------------------------------------------------------
# Context projections (Phase C / Phase 1; verified Foundation Phase 2)
# ---------------------------------------------------------------------------

projections:
  tokenizer: "tiktoken_cl100k_base"
  budgets:
    clarification_context: 1500
    status_delta: 600
    adjustment_context: 1200
    correction_context: 1500
    completion_context: 800
  truncation_warning_threshold: 0.95   # warn when result lands above this fraction of budget
  log_truncations: true                # emit INFO log when truncations are applied

# ---------------------------------------------------------------------------
# TTS (Piper + RVC voice conversion)
# ---------------------------------------------------------------------------

tts:
  # Engine selector. Switching engines requires a process restart.
  #
  # ACTIVE (2026-05-20 round 8):
  #   "kokoro"    -- StyleTTS2 + ISTFTNet on CPU; zero VRAM; stock
  #                  am_michael voice; ack-cached for instant fillers.
  #
  # SWAP-BACK:
  #   "xtts_v3"   -- XTTS v2 + v3 Kenning pedalboard filter; +60 ms
  #                  TTFT and +2 GB VRAM vs Kokoro, but the locked
  #                  Kenning mechanical voice character. Engine spawns
  #                  an HTTP subprocess in .venv-xtts on startup.
  #   "piper_rvc" -- Legacy Piper + RVC timbre transfer (~313 ms
  #                  synth median). Original voice baseline; never
  #                  deprecated.
  engine: "kokoro"

  # Shared playback knobs (apply to ALL engines).
  pause_ms: 50                     # silence between consecutive sentence clips
  edge_fade_ms: 4                  # short fade prevents clicks at clip boundaries
  sentence_flush_chars: ".!?\n"    # only strong terminators trigger TTS flush

  # Legacy piper-engine-only fields (still readable by piper_rvc).
  piper_voice_path: "models/piper/en_US-ryan-medium.onnx"
  piper_voice_config_path: "models/piper/en_US-ryan-medium.onnx.json"
  output_sample_rate: 22050
  piper_length_scale: 1.15        # >1.0 = slower / more deliberate
  # Output-stream pre-open + low-latency hints (apply to ALL engines).
  # Pre-opens the sounddevice OutputStream during STT so the ~50 ms
  # PortAudio handshake overlaps with Whisper; ``latency='low'`` asks
  # PortAudio for the smallest acceptable buffer (saves 30-100 ms of
  # OS-level audio buffering on most Windows hosts).
  speculative_stream_open_enabled: true
  speculative_stream_sample_rate: 48000   # Kenning RVC native; Kokoro/XTTS override at runtime
  output_low_latency_mode: true

  # Legacy piper_rvc two-stage pipeline parallelism (only consulted
  # when tts.engine == "piper_rvc"; harmless overhead otherwise).
  pipeline_parallel_enabled: true

  # ┌────────────────────────────────────────────────────────────┐
  # │ ENGINE SUBSECTIONS                                         │
  # │ Each engine reads ONLY its own subsection at startup.      │
  # └────────────────────────────────────────────────────────────┘

  # ACTIVE WHEN tts.engine == "kokoro"  (current default).
  # StyleTTS2 + ISTFTNet on CPU; ~330 MB on disk; zero VRAM. The
  # kokoro PyPI package's KPipeline auto-downloads weights into the
  # HF cache on first use; model_path is a sanity-gate directory.
  # Voice character: stock am_michael (not Kenning). Round 7c/7d
  # fine-tune path is the documented way to restore Kenning's voice.
  kokoro:
    model_path: "models/kokoro"
    # 2026-05-22: switched from "am_michael" (stock) to the fine-tuned
    # Kenning voicepack. KokoroSpeech.__init__ auto-resolves "kenning" to
    # models/kokoro/voices/kenning.pt when the file exists (it does --
    # copied from E:/ultron data/kokoro_finetune/voices/ on 2026-05-22).
    # Swap back to "am_michael" if the fine-tune voice misbehaves.
    voice: "kenning"
    device: "cuda"                 # "cuda" for ~3x faster synth at +330 MB VRAM; gaming mode auto-flips to cpu
    speed: 1.0                     # 1.0 native; in-model duration shaping (below) supplies cadence, so base stays 1.0
    apply_runtime_filter: false    # set true to run v3 pedalboard over Kokoro output (CPU 10-30 ms/sentence)
    filter_preset: "v3_heavy"      # unused while apply_runtime_filter=false
    # 2026-05-22: spectral magnitude smoothing pass to mask pitch
    # wobble from the partial Kenning fine-tune (Stage 1 done +
    # Stage 2 epoch 0 only; SLM joint never ran). Cost ~10 ms/sec
    # audio; hidden by producer-consumer overlap on clips 2+ and
    # pre-applied at ack-cache build time. Flip OFF once the
    # fine-tune is fully trained (epochs 3-9 add WavLM smoothing at
    # the weight level).
    apply_spectral_smooth: false
    spectral_smooth_window: 5      # ~107 ms STFT median window at hop=512, sr=24 kHz (post-A/B sweet spot 2026-05-22)
    apply_trim_fade: true          # trim boundary noise + fade-in/out; ON for partial fine-tune; disable post full training
    trim_fade_threshold_db: -40.0  # RMS frames below this are treated as silence/noise at boundaries
    # 2026-06-12 IN-MODEL prosody shaping -- scales Kokoro/StyleTTS2's OWN
    # predicted pitch, energy, and per-phoneme duration curves BEFORE the
    # ISTFTNet decoder, so the trained Ultron timbre + baked-in reverb are
    # re-rendered unchanged with a livelier, more naturally-paced delivery.
    # ZERO added latency (a single tensor op in the existing forward pass),
    # deterministic, and applied UNIFORMLY to every clip (snap callouts AND
    # persona lines). All 1.0 / 0.0 = the raw trained voice. Hand-tuned + A/B
    # approved 2026-06-12. See kenning/tts/{f0_control,duration_control}.py.
    f0_contour_factor: 1.4         # pitch-contour expansion around the median (1.0=flat/monotone)
    f0_shift_semitones: -0.5       # median pitch shift; slightly deeper timbre
    f0_max_excursion: 4.5          # tanh soft-limit (semitones) on pitch excursion -> no single-word spikes
    f0_energy_factor: 1.2          # mean-preserving energy/dynamics expansion (emphasis)
    dur_final_factor: 1.3          # sentence-final (. ! ?) rime lengthening
    dur_internal_factor: 1.18      # phrase-internal (, ; : --) rime lengthening
    dur_stress_factor: 1.08        # primary-stressed vowel lift
    max_pause_cap_ms: 520.0        # cap any internal pause so dramatic pauses stay under the 600 ms dead-air flag; 0=off

  # Output-quality watcher (2026-06-11): every synthesized clip is
  # analyzed on a DAEMON thread for audible blips -- hard un-faded
  # onsets/tails (pop on stream open/close), isolated noise bursts at
  # the start/end of sentences (the fine-tune artifact trim_fade
  # mitigates), discontinuity clicks at sentence joins, internal
  # dropouts, clipping, DC offset. Findings -> WARNING log +
  # logs/audio_quality.jsonl. Hot path pays only a non-blocking
  # queue put; fully fail-open.
  output_watch:
    enabled: true
    jsonl_filename: "audio_quality.jsonl"
    max_queue: 16                  # overflow drops clips, never blocks synth
    waveform_enabled: true         # per-clip envelope stream for the panel's waveform pane
    waveform_jsonl_filename: "audio_waveform.jsonl"

  # ACTIVE WHEN tts.engine == "xtts_v3"  (swap-back).
  # XTTS v2 streaming + v3 Kenning pedalboard filter. Engine spawns
  # an HTTP subprocess in .venv-xtts on startup. Adds ~60 ms TTFT
  # and ~2 GB VRAM vs Kokoro, but preserves the Kenning mechanical
  # voice character.
  xtts_v3:
    # The isolated venv (gitignored, ~5.3 GB, baked-in absolute paths) and
    # the reference WAV were NOT migrated during the 2026-06-12 Kenning
    # rename -- they physically stay at ultronVoiceAudio/ (a real local
    # runtime-asset path, like the C:\STC\ultronPrototype checkout dir).
    # The server script is tracked and moved to kenningVoiceAudio/.
    server_python: "ultronVoiceAudio/.venv-xtts/Scripts/python.exe"
    server_script: "kenningVoiceAudio/scripts/xtts_server.py"
    # The reference WAV lives under the "kokoro training audio"
    # subdirectory (moved there during the disk-cleaning pass); the file
    # keeps its original name in the gitignored asset dir.
    reference_audio: "ultronVoiceAudio/kokoro training audio/Ultron_vocals_mono_v1.wav"
    host: "127.0.0.1"
    port: null                     # null = engine picks a free port
    filter_preset: "v3_heavy"      # locked production preset
    filter_tail_silence_ms: 200.0  # reverb-tail padding before clipping
    speed: 1.15                    # native 1.0; safe range ~0.7-1.4
    temperature: 0.65              # lower = sharper duration tokens (fewer phantoms)
    # Phantom-tail trim catches residual XTTS-v2 phantom-token tails
    # that slip past the temperature reduction. Set false for A/B.
    phantom_tail_trim_enabled: true
    phantom_tail_silence_threshold: 0.005
    phantom_tail_max_event_ms: 200.0
    phantom_tail_min_lead_silence_ms: 150.0
    # 2026-05-20 round 9: extended reference-window conditioning.
    # Coqui XTTS-v2 library defaults are 6 / 6 / 30 -- meaning only
    # ~6 s of Kenning_vocals_mono_v1.wav reached the prosody encoder
    # despite the file being 3 minutes long. Bumping these consumes
    # more of the reference at startup (~1-2 s extra one-time cost)
    # for a meaningfully richer speaker embedding.
    gpt_cond_len: 30               # was Coqui default 6; total seconds fed to GPT prosody encoder
    gpt_cond_chunk_len: 6          # XTTS-standard chunk size; gpt_cond_len/this = N averaged chunks
    max_ref_length: 60             # was Coqui default 30; total seconds fed to HiFi-GAN speaker encoder

  # ACTIVE WHEN tts.engine == "piper_rvc"  (legacy fallback).
  # Original baseline voice character. Voice-quality lock applies
  # here -- the RVC model + index are non-negotiable per the
  # 2026-05-09 lock declaration.
  rvc:
    enabled: true
    model_dir: "kenning_rvc_voice"
    model_path: "kenning_rvc_voice/Kenning.pth"
    index_path: "kenning_rvc_voice/added_IVF301_Flat_nprobe_1_Kenning_v2.index"
    support_dir: "models/rvc"
    hubert_path: "models/rvc/hubert_base.pt"
    rmvpe_path: "models/rvc/rmvpe.pt"
    device: "cuda:0"
    pitch_shift: -2              # semitones; lower = deeper
    index_rate: 0.66             # 0-1; higher = stricter match to trained timbre
    protect: 0.45                # 0-0.5; higher preserves Piper consonants
    f0_method: "rmvpe"           # most accurate pitch extractor
    rms_mix_rate: 0.35           # higher = more articulate
    filter_radius: 1             # median filter on F0

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

logging:
  file: "logs/kenning.log"
  level: "INFO"
  format: "%(asctime)s | %(levelname)-7s | %(name)-24s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"

# ---------------------------------------------------------------------------
# Capability routing (Phase 5) — extends intent classification beyond coding
# to browser/media/messaging/file/shell/hybrid; dispatches via OpenClaw.
# OpenClaw is currently STUBBED — see openclaw section below.
# ---------------------------------------------------------------------------

routing:
  llm_disambiguation_enabled: true
  hybrid_task_decomposition_enabled: true
  disambiguation_question_template: "Did you mean to {coding_interpretation}, or to {automation_interpretation}?"
  routing_log_path: "logs/routing_decisions.jsonl"
  classifier:
    rule_based_first: true
    llm_fallback_enabled: true
    confidence_threshold: 0.7
  # 2026-05-22 -- confidence-band clarification flipped on. When a
  # routing intent's confidence sits in [band_low, band_high) AND the
  # intent kind is in the ambiguity-relevant set (automation kinds +
  # app_launch + screen_context + window_move/close), the orchestrator
  # consults :func:`kenning.openclaw_routing.ambiguity.should_clarify`
  # and -- if it returns Yes -- asks one clarifying question via the
  # IntentDisambiguator instead of executing the ambiguous verdict.
  # Default band ``[0.4, 0.65)`` is the "guessing" zone; above 0.65
  # we trust the classifier, below 0.4 we fall through to the legacy
  # path. Watch logs/routing_decisions.jsonl for "clarify" outcomes
  # in the next session and tighten / widen the band if needed.
  ambiguity_band_clarification:
    enabled: true
    band_low: 0.4
    band_high: 0.65
  # 4B plan Item 5 — IRMA-style input reformulation for the
  # IntentDisambiguator. Default ON so the disambiguator gets the
  # context (recent intents, active session, routing hints) it
  # otherwise has to guess at. Voice hot path is unaffected — only
  # the disambiguator pass uses this.
  irma:
    enabled: true
    max_recent_decisions: 5
  stub_responses_enabled: true   # set false after OpenClaw integration completes

# ---------------------------------------------------------------------------
# OpenClaw peer Gateway (Phase 5 stub; filled in by OpenClaw integration phase)
# ---------------------------------------------------------------------------

openclaw:
  # 2026-05-26 (production-wiring pass) -- user confirmed Gateway is
  # installed and running locally. Flipping ``enabled: true`` switches
  # the dispatcher from stub voice messages to live OpenClaw plugin
  # invocations for BROWSER_AUTOMATION / MESSAGING / MEDIA_GENERATION
  # / FILE_OPERATION / SHELL_OPERATION / HYBRID_TASK / DESKTOP_AUTOMATION
  # / WINDOW_AUTOMATION intents. Bridge construction is fail-open --
  # if the Gateway is unreachable at startup, the bridge logs WARN +
  # falls back to the in-character stub message ("the gateway isn't
  # connected yet") and a daemon retry thread polls in the background.
  enabled: true
  gateway_url: "http://127.0.0.1:11280"
  auth_token_env: "OPENCLAW_AUTH_TOKEN"
  health_check_timeout_seconds: 30.0
  health_check_interval_seconds: 60.0
  fail_open: true                     # unreachable → in-character stub, not hard error
  # Canonical user-facing persona agent in ~/.openclaw/openclaw.json.
  # (Pre-2026-06-12 this said "ultron" -- an agent id that never existed
  # in the gateway config; the Kenning rename aligned it with the real
  # kenning-main agent.)
  required_agent_id: "kenning-main"
  # 4B plan Item 8 — block-and-revise validator on tool calls. When ON,
  # the dispatcher runs a short pre-flight LLM check before each
  # handle_* method: "does this tool call advance the user's stated
  # goal?" — short-circuits with the validator's reason on BLOCK. The
  # validator fails OPEN on LLM errors so a flaky LLM never paralyses
  # the dispatcher. Currently the dispatcher itself is stubbed
  # (Phase 5); the validator's interface stays the same when OpenClaw
  # is wired live in a later phase.
  block_and_revise:
    enabled: true
  # Phase 3 bridge layer — CLI transport, MCP registration, workspace
  # IO, inbound event routing. Active only when openclaw.enabled=true.
  bridge:
    # CLI transport. Phase 3 invokes the openclaw CLI via subprocess
    # (the documented public interface) rather than undocumented HTTP.
    # cli_path null = auto-discover via PATH, then platform defaults.
    cli_path: null
    cli_timeout_seconds: 30.0

    # MCP registration. The default "auto" resolves to the canonical
    # entry script (scripts/run_kenning_mcp_for_openclaw.py invoked
    # via the project's .venv Python). Set to a custom command +
    # args, or to null to disable registration entirely.
    # Spawn shape: <command> <args...>. Used by `openclaw mcp set`.
    mcp_server_name: "kenning-mcp"
    mcp_server_command: "auto"
    mcp_server_args: []
    retry_registration_interval_seconds: 60.0

    # Shared workspace. null = auto-discover via persona.default_workspace_dir.
    workspace_dir: null
    workspace_lock_timeout_seconds: 5.0

    # Inbound voice handoff. 2026-05-26 (production-wiring pass)
    # -- flipped ON now that the Gateway is live, so messages prefixed
    # with [voice] in OpenClaw channels (e.g. Telegram if/when wired)
    # route into kenning's voice pipeline.
    inbound_voice_handoff_enabled: true
    inbound_voice_handoff_prefix: "[voice]"

    # Per-call timeouts.
    tool_invocation_timeout_seconds: 30.0
    message_send_timeout_seconds: 10.0

# ---------------------------------------------------------------------------
# Notifications (OpenClaw integration Phase 4) — proactive pings to remote
# channels. All flags default OFF until the user has set up the channel
# on the OpenClaw side. Failures are logged and never propagate to the
# voice path.
# ---------------------------------------------------------------------------

notifications:
  telegram:
    # Master switch. Even when true, individual events still need
    # their per-event flag below to be true. Requires the Telegram
    # channel to be configured in OpenClaw — see
    # docs/openclaw_telegram_setup.md.
    enabled: false

    # Env var that resolves to the Telegram user id messages are sent
    # to. Stored in env (not config) so it stays out of git.
    user_id_env: "TELEGRAM_USER_ID"

    # Direct user id used when user_id_env is unset. Production setups
    # leave this null and rely on the env var.
    fallback_user_id: null

    # Per-event opt-ins. Disable any of these to suppress that
    # specific notification class without flipping the master switch.
    notify_on:
      coding_task_completion: true
      coding_task_clarification_needed: true
      heartbeat_alerts: true
      standing_order_outputs: true
      search_results_async: false           # opt-in; can be noisy

# ---------------------------------------------------------------------------
# Heartbeat (OpenClaw integration Phase 5) — local persistence + retention
# for alerts raised by the OpenClaw-side heartbeat agent. The agent
# itself is configured in ~/.openclaw/openclaw.json (cadence, target
# channel, etc.). See docs/openclaw_heartbeat_setup.md.
# ---------------------------------------------------------------------------

heartbeat:
  alert_log_path: "logs/heartbeat_alerts.jsonl"
  alert_retention_days: 30
  # When true, every recorded alert is also pushed to Telegram via
  # NotificationDispatcher (subject to notifications.telegram per-event
  # gating). Disabling this records alerts to the log only.
  auto_notify_telegram: true

# ---------------------------------------------------------------------------
# Media generation (OpenClaw integration Phase 12) — image / video /
# music tools via OpenClaw provider plugins. Local-only: ComfyUI is
# the canonical option (other providers like Fal / Runway / Suno are
# pay-per-use and explicitly NOT supported per project policy — only
# the AI coding agent is paid in this stack). Provider configuration lives in
# ~/.openclaw/openclaw.json under models.providers.<slug>.
# See docs/openclaw_media_generation_setup.md.
# ---------------------------------------------------------------------------

media_generation:
  enabled: true                                # set false to suppress dispatch
  image_tool: "image_generate"
  video_tool: "video_generate"
  music_tool: "music_generate"
  default_image_provider: null                 # null = OpenClaw picks
  default_video_provider: null
  default_music_provider: null
  default_timeout_seconds: 120.0               # gen jobs can take a minute+
  delivery_voice: "telegram"                   # voice queries → Telegram delivery
  delivery_text: "inline"
  acknowledgment_phrases:
    - "Working on that. Should be a moment."
    - "Generating now."
    - "I'll send it when it's ready."

# ---------------------------------------------------------------------------
# Browser tool (OpenClaw integration Phase 6) — voice-side ack timing
# and per-call timeouts. The actual browser machinery comes from
# OpenClaw's bundled plugin (Playwright + Chromium). See
# docs/openclaw_browser_setup.md.
# ---------------------------------------------------------------------------

browser:
  enabled: true                                # set false to suppress browser dispatch
  default_snapshot_mode: "ai"                  # 'ai' (refs) or 'aria' (a11y tree)
  default_navigation_timeout_seconds: 30.0
  default_action_timeout_seconds: 10.0
  default_screenshot_timeout_seconds: 30.0
  long_running_progress_threshold_seconds: 5.0
  # Voice ack pool. Played within ~200ms of a browser intent firing.
  acknowledgment_phrases:
    - "Pulling up that page now."
    - "Looking at it."
    - "Loading the site."
    - "Give me a moment to navigate."

# ---------------------------------------------------------------------------
# Intent recognizer (2026-05-22) -- engine-agnostic semantic matching
# of voice utterances against registered canonical phrases via Gemma-300M
# embeddings. Matched intents short-circuit the LLM gating path and fire
# local handlers in ~5-15 ms. Works with any STT engine (Parakeet /
# Moonshine / Whisper / typed input). Adds ~300 MB CPU RAM in q4.
# ---------------------------------------------------------------------------
intent:
  enabled: true                  # opt-in; flip to true to wire matching
  model_variant: "q4"            # q4|q8|fp16|fp32|q4f16 (~300 MB at q4)
  # 2026-05-22 lowered from 0.8 to 0.65 -- live test showed "switch to
  # gaming mode" scored ~0.7 against "engage gaming mode" (semantically
  # very close, but the threshold rejected it). 0.65 catches natural
  # variations without obvious false positives. Tune up if you start
  # seeing the wrong intent fire; tune down for even broader matching.
  threshold: 0.65
  warmup_on_init: true           # pre-load on startup so first match is fast
  # Register multiple natural phrasings per intent. The recognizer matches
  # against the FIRST canonical form; all the variants below resolve to
  # the same orchestrator-side handler (engage / disengage / status).
  phrases:
    # Engage variants
    - "engage gaming mode"
    - "switch to gaming mode"
    - "turn on gaming mode"
    - "start gaming mode"
    - "activate gaming mode"
    # Disengage variants
    - "disengage gaming mode"
    - "turn off gaming mode"
    - "stop gaming mode"
    - "exit gaming mode"
    - "deactivate gaming mode"
    # Status
    - "gaming mode status"
    # Time / date locals
    - "what time is it"
    - "what is today's date"
    # 2026-05-22 -- "needs fresh data" phrases. Semantic match against
    # these forces the gate verdict to SEARCH (skipping preflight LLM).
    # Catches variations the regex layer misses ("give me the latest
    # scoop", "what's the buzz", "fill me in on what's going on").
    - "what is the latest news"
    - "what are the latest news"
    - "tell me the latest news"
    - "any recent news"
    - "any news today"
    - "what is happening today"
    - "what is going on"
    - "tell me what is new"
    - "current events"
    - "give me the latest update"
    - "what is the latest in ai"
    - "what is the buzz"

# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Events (2026-05-23 OpenHands batch 3 T2 + T13) -- canonical event store
# with optional hash chain. When enabled, the orchestrator builds the
# configured backend (memory / jsonl / qdrant) and subscribes the bus
# so every published event lands as a persisted row stamped with a
# SHA-256 chain hash. Default OFF so bus dispatch + voice latency are
# unchanged. Flip enabled: true to make the bus history queryable +
# zip-exportable for repro artefacts.
# ---------------------------------------------------------------------------

events:
  enabled: true                    # 2026-05-25: integration flip -- canonical event store + chain
  store_backend: "jsonl"           # memory | jsonl | qdrant
  base_dir: "data/events"          # relative to PROJECT_ROOT
  qdrant_collection: "events"      # used when store_backend == qdrant
  default_session_id: "default"    # fallback for bus events with no session_id
  install_bus_sink: true           # auto-mirror bus events into the store

# Note: Event callbacks (OpenHands batch 4 T3) are wired via Python API
# only in this release -- the CallbackRegistry singleton in
# src/kenning/events/callbacks.py is opt-in by code. A YAML-driven
# callback catalogue is intentionally deferred until the
# discriminated-union pattern (T23) lands so processor classes can be
# round-tripped through config.

# ---------------------------------------------------------------------------
# Skills (2026-05-23 OpenHands batch 2 T1) — trigger-loaded knowledge bundles.
#
# When enabled, the orchestrator walks ``skills/`` (public), ``~/.kenning/skills/``
# (user), ``<project>/.kenning/skills/`` (project), parses each .md file's YAML
# frontmatter, and the LLMEngine prepends matched skill bodies to the system
# prompt for the current turn only. Always-on skills (no triggers) fire every
# turn; keyword-trigger skills fire on whole-word substring match; slash-command
# skills fire on /commands.
#
# Default OFF so the voice baseline is unchanged. Flip ``enabled: true`` after
# auditing the skills/ catalog the operator wants active.
# ---------------------------------------------------------------------------

skills:
  enabled: true                        # 2026-05-25: integration flip -- skills inject matched bodies into system prompt
  always_on_only: false                # debug toggle: drops triggered skills
  disabled_skills: []                  # names to suppress even when matched
  default_min_user_text_chars: 8       # guard against one-word false fires
  max_matches_per_turn: 6              # cap on triggered (non-always-on) skills
  max_skill_block_chars: 8000          # hard cap on the injected block; 0 = no cap
  public_dirname: "skills"             # relative to PROJECT_ROOT
  user_dirname: ".kenning/skills"       # relative to user home
  project_dirname: ".kenning/skills"    # relative to PROJECT_ROOT
  extra_dirs: []                       # additional PROJECT-precedence dirs

# ---------------------------------------------------------------------------
# Gaming mode (V1-spec gap A1) — anticheat-safe shutdown of OpenClaw
# desktop / windows control plugins. When engaged, runs
# ``openclaw plugins disable <id>`` for each slug below so Vanguard /
# Easy Anti-Cheat / etc. don't see the plugin processes. ``gaming
# mode off`` reverses the cycle. Default OFF — this is a
# safety-critical toggle that disables plugins; the operator opts
# in explicitly once they want the voice trigger active.
# See docs/openclaw_gaming_mode_setup.md.
# ---------------------------------------------------------------------------

gaming_mode:
  enabled: true                  # 2026-05-22: voice-trigger active; LLM/Kokoro/STT/VLM swap fires regardless of openclaw state
  # Anticheat-safe mode (2026-06-11): hard-blocks EVERY desktop-interaction
  # surface -- input injection, screen capture, pixel/template reads, OCR,
  # UIA reads, clipboard, dialog/element automation, window manipulation,
  # app launch, browser CDP, bridge desktop tools -- at three layers
  # (49 module guards + safety-validator BLOCK_HARD + voice intents).
  # Audio stays fully alive: mic, STT, LLM, TTS, and the VoiceMeeter team
  # relay are shared-mode audio APIs (the same surface Discord uses) and
  # never touch another process. nvidia-smi VRAM probes and Kenning's
  # self-scoped process management (own children only) are analyzed-safe
  # and unaffected. Voice toggle: "enable/disable anticheat mode".
  # Anticheat-safe mode (2026-06-12): PINNED ON for this setup. The user runs
  # Kenning alongside Valorant (Vanguard), so the hard block is ALWAYS-ON from
  # boot -- there is no startup window where any desktop-interaction surface is
  # live. This is the always-on override (independent of engaging gaming mode);
  # audio (mic, STT, LLM, TTS, the VoiceMeeter team relay) and the waveform
  # overlay window stay fully alive. Toggle in the settings panel
  # (Gaming / Anticheat -> Anticheat-safe mode) or by voice.
  anticheat_safe_mode: true            # PINNED ON -- safe to run with Vanguard
  engage_at_startup: true              # boot straight into bare-bones gaming mode (min GPU)
  # LEAN BOOT (barebones) -- all ON by default: each keeps a NON-ESSENTIAL
  # subsystem OUT of RAM (never imported) so nothing beyond core relay + Spotify
  # + voice is loaded or visible to the Vanguard kernel anticheat. Explicit here
  # so config.yaml is the complete source of truth the settings panel reflects.
  barebones_skip_retrieval: true       # gaming turns skip RAG memory + reranker (GPU/compute saver)
  barebones_skip_web_search: true      # gaming turns skip the web-search preflight + executor
  barebones_skip_coding: true          # never import the coding stack (ProjectIndex/Supervisor/MCP/voice)
  barebones_skip_openclaw: true        # never import the OpenClaw bridge runtime (+threads)
  barebones_skip_docker_autostart: true  # skip Docker autostart
  barebones_skip_evolution: true       # skip the evolution service
  barebones_skip_events: true          # skip the events subsystem
  barebones_skip_skills: true          # skip skills
  barebones_skip_summarizer: true      # skip the background summarizer
  barebones_skip_memory: true          # skip Qdrant + bge-small/bm25 encoders (retrieval is off in gaming, so recording is never read back)
  barebones_skip_intent: true          # skip the in-process intent recognizer (duplicate embeddinggemma-300m q4; redundant while gaming)
  barebones_skip_ack_prewarm: true     # skip prewarming the ack-clip cache (conversational acks are suppressed in gaming)
  barebones_skip_reranker_warmup: true # skip the cross-encoder reranker warmup
  barebones_direct_gaming_llm: true    # construct the LLM directly as the 3B-CPU gaming preset (no 4B-on-GPU transient)
  barebones_lazy_zero_shot_addressee: true  # lazy-load the flan-t5 addressee classifier
  llm_gpu_layers: 0                    # 0 = gaming LLM fully on CPU (no GPU spike on generation); -1 to keep it on GPU
  anticheat_with_gaming_mode: true     # (retained for back-compat; tie is unconditional)
  plugins_to_disable:
    - desktop-control
    - windows-control
  # 2026-06-11: ON -- Docker Desktop (WSL2 vmmem, typically 2-4 GB RAM +
  # background CPU) is stopped on engage and restarted on disengage.
  # SearxNG goes down with it; web search fails open to Brave/DDG.
  toggle_docker: true
  docker_executable_path: null              # null = use default Windows path
  docker_process_name: "Docker Desktop"
  log_path: "logs/gaming_mode.jsonl"
  # Smaller LLM swapped in on engage to free ~1.5 GB VRAM for the game.
  # Disengage restores the prior preset. Set "" to disable the swap and
  # keep the standby LLM during gaming.
  llm_preset: "llama-3.2-3b-abliterated"

# ---------------------------------------------------------------------------
# Desktop control (V1-spec gap C3) — voice routing for the OpenClaw
# ``desktop-control`` plugin: screenshot, list_windows, find_window.
# Default ON. Dispatch falls back to the "isn't wired up yet" voice
# message when either the OpenClaw bridge isn't connected or the
# plugin isn't installed in OpenClaw. Set false to suppress the
# routing entirely (voice queries fall through to conversational).
# See docs/openclaw_desktop_control_setup.md.
# ---------------------------------------------------------------------------

desktop:
  enabled: true
  default_screenshot_timeout_seconds: 10.0
  default_action_timeout_seconds: 5.0
  plugin_slug: "desktop-control"
  tool_slug_screenshot: "desktop_screenshot"
  tool_slug_list_windows: "desktop_list_windows"
  tool_slug_find_window: "desktop_find_window"
  # Production-hardening #72b: on a SEMANTIC_CLICK name-lookup miss, run a
  # bounded DeepUIDiscoveryLoop (LLM-suggested alternative queries over the
  # gated UIA find) and retry the click on the best candidate. Miss-path
  # only; the direct-hit path never pays for it. Fail-open.
  deep_ui_discovery_enabled: true
  # 2026-05-26 (production-wiring pass) -- click-preview gate ON.
  # Every click on a previously-unseen region runs through a VLM
  # round-trip (Moondream2) to confirm what's under the cursor. First
  # click in a region pays the ~1-2 s VLM cost; subsequent clicks
  # within auto_pass_radius_px=100 auto-pass. When the VLM is
  # unloaded (gaming mode), the gate goes DEGRADED + falls through
  # to the legacy allow path.
  click_preview:
    enabled: true
    auto_pass_radius_px: 100
    crosshair_size: 20
    block_on_degraded: false

# ---------------------------------------------------------------------------
# Window control (V1-spec gap C3) — voice routing for the OpenClaw
# ``windows-control`` plugin (UI Automation primitives). Default ON
# with the same fail-open posture as desktop above.
# ---------------------------------------------------------------------------

window_control:
  enabled: true
  default_action_timeout_seconds: 5.0
  plugin_slug: "windows-control"
  tool_slug_focus: "windows_focus_window"
  tool_slug_click: "windows_click_element"
  tool_slug_type: "windows_type_text"

# ---------------------------------------------------------------------------
# browser-use CDP browser tier (catalog 10, 2026-05-29)
# ---------------------------------------------------------------------------
# Second-tier browser surface on top of the existing UIA extraction
# in ``desktop/uia.py:extract_browser_content``. Wraps the external
# open-source ``browser-use`` CLI (Playwright + CDP) -- the upstream
# binary is NOT a hard dependency: every method fails-open with a
# clear "binary missing" error when ``browser-use`` is not on PATH.
#
# Default ON because the fail-open contract covers the missing-binary
# case. Operators who want the CDP tier just ``pip install browser-use``
# (or set ``binary_path`` to an explicit absolute path). Voice baseline
# is unchanged either way -- the voice path does not currently call
# the CDP tier; ``screen_context.py`` integration arrives in batch 9.
#
# Catalog 10 binding skip list (enforced at the wrapper level, not
# just here):
#   * Cloud mode (``cloud connect`` / ``cloud signup``) -- OUT
#     under feedback_no_paid_apis.md
#   * Cloudflare tunnel (``tunnel`` subcommand) -- OUT (inbound attack
#     surface + outbound exfiltration vector)
#   * ``--cdp-url`` external URL arg -- BLOCKED at wrapper
#   * ``BROWSER_USE_SESSION`` env var -- SCRUBBED on every call
#
# Knobs in this section:
#   enabled                          master switch
#   binary_path                      explicit path; null triggers PATH discovery
#   default_session                  null = "no session flag"; or a name like "kenning"
#   default_timeout_seconds          per-call subprocess wall-clock cap
#   default_wait_timeout_ms          ``wait_selector`` / ``wait_text`` default
#   max_sessions                     cap on simultaneous named sessions (batch 5)
#   headed                           append ``--headed`` to every ``open``
#   screen_context_fallback_enabled  whether to slot into screen_context tier chain
#                                    (wired in batch 9; the knob ships ON so the
#                                     batch-9 wiring activates without re-flipping)

browser_use:
  enabled: true
  binary_path: null
  default_session: null
  default_timeout_seconds: 30.0
  default_wait_timeout_ms: 30000
  max_sessions: 3
  headed: false
  screen_context_fallback_enabled: true

# ---------------------------------------------------------------------------
# Deep research (catalog 12 / felo-search T3) — bounded agentic multi-step
# research over the FREE local-first search ladder. EXPLICIT voice opt-in
# ("research X in depth" / "do a deep dive on X"); the normal sub-second
# search path is untouched. A deep-research turn runs several full searches
# (~10-18 s), bounded by max_steps (the load-bearing AgentLoop cap). Fails
# open at every layer; reuses the same provider/reader chains, rate-limit
# tracker, and web_results cache as normal search.
# ---------------------------------------------------------------------------
deep_research:
  enabled: true
  max_steps: 3                  # research rounds (decompose, then gap-fill)
  max_sub_queries_per_step: 3   # sub-questions searched per round
  top_n_per_query: 3            # ranked sources kept per sub-question
  max_accumulated_sources: 8    # hard cap on gathered sources (bounds prompt)

# ---------------------------------------------------------------------------
# Voice relay — "tell my teammates X" speaks INTO the game voice chat.
# ---------------------------------------------------------------------------
# A strict matcher intercepts "tell my teammates / say X to my team / ask
# the team ..." utterances, the LLM rephrases the reported speech into a
# direct second-person line, Kokoro synthesizes it, and the clip plays on
# output_device — a VoiceMeeter virtual input. Route that strip to the
# same B-bus as your microphone (e.g. B2) in VoiceMeeter and set the
# game's input device to that bus: teammates then hear Kenning through
# the mic channel. Fail-open: a missing device speaks a short error on
# the normal output instead.
# ---------------------------------------------------------------------------
# Spotify — voice playback control ("play despacito", "skip", "pause",
# "what's playing", "turn it up"). Credentials live in a gitignored file
# OUTSIDE the repo (~/.kenning/spotify.json); run scripts/spotify_setup.py
# ONCE to authorize. Needs Spotify Premium + an open Spotify device.
# ---------------------------------------------------------------------------
spotify:
  enabled: true
  credentials_path: "~/.kenning/spotify.json"
  default_device: ""             # preferred fallback device name (empty = first)

relay_speech:
  enabled: true
  # TEAM output: only what Kenning says TO your teammates lands here (callouts,
  # relayed messages) -- never private conversation. Points at the FREE
  # "Voicemeeter Input" virtual strip; route that strip to bus B1 in VoiceMeeter
  # and select "Voicemeeter Out B1" as Kenning's mic in your game (and add it in
  # OBS if you want viewers to hear team callouts on a dedicated track).
  # Name substring or PortAudio index. Separate from the EVERYTHING feed above.
  output_device: "Voicemeeter Input"
  rephrase: true              # LLM converts reported speech -> direct address
  max_line_chars: 360         # ceiling for a full two-sentence reply; trims only at a sentence boundary
  echo_to_user: true          # ALSO play team callouts on your default speakers
                              # (local monitor tee -- so YOU hear your own callouts,
                              # not just teammates/OBS). Hot-applies per callout.
  # Named callouts ("ask Clove to smoke window", "tell Sova to drone
  # sewers", "ask Sage if I can get a heal"). Empty list = the built-in
  # Valorant agent roster; add friend names / other-game callsigns here.
  # CLOSED vocabulary -- names not listed never trigger a relay.
  addressee_names: []
  # After a relay turn the follow-up window stays open this long, and
  # relay-shaped utterances inside it skip the wake word AND the
  # addressing classifier -- say "Kenning, tell my team..." once, then
  # just keep talking: "ask sage for a heal", "tell them nice try", ...
  follow_up_seconds: 120.0
  # "Kenning, roast my team" lines -- one per row in this file, spoken
  # VERBATIM (never LLM-authored). Seeded on first use; edit any time,
  # re-read per roast.
  roast_lines_path: "data/relay_roasts.txt"
  # "Kenning, tell my team a fun fact" corpus -- one true fact per row,
  # spoken VERBATIM. Ships in the repo; re-read per request.
  fun_facts_path: "data/relay_fun_facts.txt"

# ---------------------------------------------------------------------------
# Voice waveform overlay — a compact, dynamic visualizer window for OBS.
# ---------------------------------------------------------------------------
# A SEPARATE borderless, always-on-top window (not the settings panel) that
# renders a circular/radial visualizer reacting to EVERY line Kenning speaks
# (normal + relay). Add it in OBS as ONE Window Capture ("KENNING // VOICE")
# so viewers see him talking — no second physical device / virtual cable
# needed for the visual. transparent=true keys out bg_color on Windows so only
# the glow shows over your game. Drag with left-drag; right-click to hide.
# Off by default; toggle live from the settings panel (Voice → Waveform overlay).
visualizer:
  enabled: true                # overlay ON for streaming (anticheat-safe: own window only)
  size: 300                  # window px (square)
  bars: 60                   # radial bars
  fps: 60                    # redraw rate (60 = smooth spin + breathing)
  bg_color: "#00ff00"        # NEON GREEN chroma-key background -- add a Chroma Key (green) filter in OBS to drop it; the red art + dark nameplate stay
  accent_color: "#e5484d"    # Kenning crimson
  transparent: false         # solid bg (NOT Windows-transparent): OBS window capture renders it as green so you can color-key. (transparent=true shows BLACK in OBS, which won't key.)
  # true  = floats on top of everything (easy to see/position while setting up).
  # false = BACKGROUND mode: sinks behind your desktop windows (tool window, no
  #         taskbar/Alt-Tab, never steals focus) so it's not distracting, while
  #         OBS still captures it -- use OBS Window Capture with the
  #         "Windows 10 (1903+)" method, which grabs the window even when it's
  #         fully behind others. No admin needed. Toggle the overlay off/on (or
  #         restart) after changing this.
  always_on_top: false         # false = BACKGROUND mode: sinks BEHIND your desktop windows (not distracting) while OBS WGC still captures it. Set true to float on top while positioning.
  nameplate_text: "ULTRON"   # stylized name plate below the waveform ("" = off)
  nameplate_font: "Bahnschrift"  # techy font (falls back if not installed)

# ---------------------------------------------------------------------------
# Stop button — tiny always-on-top, mouse-clickable kill switch.
# ---------------------------------------------------------------------------
# Clicking it fires the SAME all-channel cancel as voice "Ultron, stop", but
# WITHOUT the wake-word watcher (which self-triggers on the monitor-speaker
# loopback, so that watcher is held off). In-process tkinter, like the
# visualizer overlay; a button click is an ordinary window message — NOT input
# monitoring — so it adds nothing to the anticheat surface. Summon/dismiss by
# voice: "show the stop button" / "hide the stop button".
stop_button:
  enabled: true                # allow the voice summon at all (master switch)
  show_at_startup: false       # true = the window is up the moment Ultron boots
  width: 120                   # window px (wide)
  bar_height: 16               # black drag strip on top (grab to reposition)
  button_height: 36            # the STOP button itself
  bg_color: "#000000"          # fully black window + bar
  accent_color: "#e5484d"      # Kenning crimson — button text + 1px border
  button_fill: "#140709"       # near-black button face (brightens on hover/press)
  always_on_top: true          # float over the (borderless-windowed) game
  label: "STOP"
  x: 60                        # initial top-left position on screen
  y: 60

# ---------------------------------------------------------------------------
# Testing mode — mimics gaming/anticheat disabled-functionality on the GPU.
# ---------------------------------------------------------------------------
# A SEPARATE, off-by-default mode for corpus testing: RAG retrieval, the
# reranker, web search, and desktop automation are all OFF (same as gaming +
# anticheat) so outputs reflect the gaming runtime, but the LLM/TTS stay on the
# GPU for fast generation. It NEVER triggers the gaming device swaps and NEVER
# alters real gaming/anticheat engage. Keep this false for normal use; the test
# harness flips the runtime flag itself.
testing_mode:
  enabled: false

# ---------------------------------------------------------------------------
# Evolution (catalog 13) — bounded autonomous self-improvement.
# ---------------------------------------------------------------------------
# Kenning observes its own turns, distills repeated success patterns into
# live trigger-loaded skills under data/evolution/skills/*.md, every
# proposal gated by a fail-closed pre-flight + reversible checkpoint +
# regression guardrails + hash-chained audit. Data-only, zero-network,
# Tier-3-walled (never rewrites src/kenning/, the safety validator, the
# audit ledger, or the engine itself). Default ON, fully fail-open.
evolution:
  enabled: true
  max_steps: 3                    # AgentLoop step cap per cycle
  cycle_check_interval_turns: 25  # recorded turns between autonomous cycle checks
  pause_on_demote: false          # demote a churny surface to propose-only, don't pause it
  apply_temperament: true         # prepend the learned concise/detailed tone hint to turns
  # Catalog 14 (clawhub-self-improving-agent) qualitative-capture knobs (all default ON):
  correction_detection_enabled: true     # capture user corrections + knowledge gaps -> repair distillation
  feature_request_capture_enabled: true  # capture "I wish you could X" to a non-distilled backlog (digest only)
  command_failure_capture_enabled: true  # capture coding-task command/tool failures -> repair distillation
  pre_turn_nudge_enabled: true           # bounded "[Evolution: ...]" system-prompt nudge when the queue is non-empty
  pre_turn_nudge_max_chars: 240          # hard char cap on the nudge (~<=50 tokens; 0 disables)
  recurrence_threshold: 3                # a pattern must recur this many times to be distill-ready
  # Guardrail auto-revert brake (#15+#65) -- real per-turn metrics feed the four
  # regression guardrails, and a KEPT skill is re-checked after N further turns
  # against a pre-apply snapshot (regression -> data-only auto-revert):
  guardrail_monitoring_enabled: true     # per-turn metrics ring + post-apply re-check
  guardrail_window_turns: 40             # bounded observation window
  guardrail_min_latency_samples: 5       # TTFT observations before the latency guard sees a value
  guardrail_min_rate_samples: 10         # turns before correction/error rates are reported
  post_apply_monitor_turns: 8            # turns a kept skill is watched before the re-check

# ---------------------------------------------------------------------------
# Error phrases (Phase 4) — user-facing voice messages for dependency failures
# ---------------------------------------------------------------------------
# Each list is a phrase pool. Empty list disables narration for that
# failure mode. Errors still log to logs/errors.jsonl regardless.
# Phrases stay in Kenning's voice (precise, weighted, slightly menacing).

error_phrases:
  qdrant_unavailable:
    - "Memory's not responding right now."
    - "I can't reach my long-term memory at the moment."
  brave_unavailable:
    - "Search isn't working right now."
    - "I can't reach the web search service."
  jina_unavailable:
    - "I got search results but couldn't read the full pages."
  anthropic_unavailable:
    - "Anthropic's API isn't responding."
    - "I've lost connection to Claude."
  rvc_unavailable:
    - "Voice conversion is offline. You'll hear me without the Kenning filter for now."
  openclaw_unavailable:
    - "I'd ask the gateway to handle that, but it's not responding right now."
  piper_unavailable:
    - "Speech output failed. I'm replying in text."
  whisper_repeated_failures:
    - "Speech recognition is having trouble."
  addressing_classifier_failure:
    - "Addressing detection is degraded; I'll respond to everything for now."
  wake_word_model_failure:
    - "Wake-word detection is offline. I'll listen continuously for now."
  mcp_server_lost:
    - "Lost connection to the coding orchestrator. The current task can't continue."
  claude_code_subprocess_failed:
    - "The coding subprocess failed. Want me to retry, or abandon the task?"
  config_invalid:
    - "Configuration is invalid. I can't start."

# ---------------------------------------------------------------------------
# Runtime tool-call validator (2026-05-12 Phases 2-5)
# ---------------------------------------------------------------------------
# Gates the capability surface (tool calls, file writes, shell commands)
# regardless of whether the LLM is willing to attempt the action. Was
# originally introduced as a load-bearing pair with abliterated LLMs
# (which lack content-level refusals); now also defence-in-depth on
# non-abliterated presets like the round-8 default qwen3.5-4b.
#
# Master switch (enabled: false) disables ALL safety enforcement. Per-rule
# toggles live under "rules" -- missing keys default to True. Rule ids
# match the 2026-05-12 restriction list:
#   K1-K10  Kenning self-protection / meta (NEVER disable without explicit
#           direction -- this is the validator protecting itself)
#   A1-A12  Filesystem destruction
#   B1-B9   Privilege escalation / system config
#   C1-C12  Security perimeter
#   D1-D17  Credentials / secret access
#   E1-E8   System stability
#   F1-F8   Repo / data integrity
#   G1-G5   Resource exhaustion
#   H1-H12  Untrusted code execution
#   I1-I6   Outbound impact (email, social, finance, paid APIs)
#   J2-J7   Data exfiltration
#   M1-M11  Persistence
#   N1-N6   Process / memory manipulation
#   O1-O8   Anti-forensics
#   P1-P5   AV / EDR tampering
#   Q1-Q4   Containers + virtualization
#   R2      Sensors (webcam)
#   S1, S4  AI-specific tampering
#   Cap-1..Cap-4  Capability carve-outs (screen context, app launch,
#                 browser default profile, window management)
# 141 rules across 19 categories total.

safety:
  enabled: true

  # Per-rule toggles. Leave empty to use the in-code defaults (every rule
  # ON). Example to disable a specific rule:
  #   rules:
  #     K7: false   # allow the model to edit dependency manifests
  rules: {}

  # Project-root-relative directory roots where destructive operations are
  # allowed. Leave empty to use the default (data/sandbox/).
  sandbox_roots: []

  # Extra files / dirs to protect on top of the built-in K list.
  # Project-root-relative paths.
  extra_protected_files: []
  extra_protected_dirs: []

  # Cap-1 screen-context capture cache (Phase 4 wiring).
  screen_cache_dir: null

  # Hostnames the model is allowed to reach via outbound network calls
  # (Categories I / J in Phase 4 consult this).
  approved_outbound_apis:
    - "api.search.brave.com"
    - "r.jina.ai"
    - "api.anthropic.com"

  # Audit log path. Every block / log-only / explicit-intent-needed verdict
  # writes one JSONL line here.
  audit_log_path: "logs/safety_audit.jsonl"
