use_default_settings:
  engines:
    keep_only:
      - bing
      - mojeek
      - wikipedia
      - wikidata
      # News-category engines (queried only when the client passes
      # categories=news, which happens for news-style user questions).
      - bing news
      - yahoo news
      - reuters

general:
  debug: false
  instance_name: "ultron-local"

server:
  secret_key: "ultron-local-search-do-not-use-in-public"
  limiter: false
  public_instance: false
  image_proxy: false
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

search:
  formats:
    - html
    - json
  safe_search: 1
  autocomplete: ""
  default_lang: "en"
  max_page: 1
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

outgoing:
  request_timeout: 3.0
  max_request_timeout: 6.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
  keepalive_expiry: 30

ui:
  static_use_hash: true
  default_locale: en
  query_in_title: true

engines:
  - name: bing
    disabled: false
    timeout: 3.0
    weight: 2

  - name: mojeek
    disabled: false
    timeout: 3.0
    weight: 1

  - name: wikipedia
    disabled: false
    timeout: 2.0
    weight: 2

  - name: wikidata
    disabled: false
    timeout: 5.0
    weight: 1

  # --- News-category engines (queried when categories=news) ---
  - name: bing news
    disabled: false
    timeout: 3.0
    weight: 2

  - name: yahoo news
    disabled: false
    timeout: 3.0
    weight: 1

  - name: reuters
    disabled: false
    timeout: 4.0
    weight: 2
